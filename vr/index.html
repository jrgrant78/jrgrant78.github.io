<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }

        #controls { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15,15,22,0.9); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
            box-sizing: border-box;
        }
        
        .upper-deck {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: stretch;
            width: 100%;
        }

        .control-core {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 170px;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 0;
        }

        .header-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            width: 100%;
        }

        #uiToggleBtn { 
            width: 32px; 
            height: 32px; 
            background: #1a1a24; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #uiToggleBtn:active { transform: scale(0.95); }
        
        #cameraWindow { 
            width: 120px;
            height: 90px;
            flex-shrink: 0;
            border: 2px solid #00e5ff; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box;
            position: relative;
        }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #libraryPreview { width: 100%; height: 100%; object-fit: cover; display: none; cursor: pointer; }
        #folderPlaceholder { 
            width: 100%; 
            height: 100%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            background: #111116; 
            cursor: pointer; 
            color: #88889c;
        }
        
        #sourceToggleBtn {
            position: absolute;
            bottom: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: rgba(26,26,36,0.85);
            border: 1px solid #555;
            border-radius: 4px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 12;
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #sourceToggleBtn:hover { border-color: #00e5ff; color: #00e5ff; }

        .btn-toolbar { display: flex; gap: 8px; width: 100%; margin: 0; }
        
        button.action-btn { 
            flex: 1; 
            aspect-ratio: 1;
            background: #1a1a24; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button.btn-scan { color: #00e676; border-color: #00e676; } 
        button.btn-gyro { color: #ffea00; border-color: #ffea00; } 
        button.btn-clear { color: #ff1744; border-color: #ff1744; } 
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
        }
        .key-input {
            flex: 1;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 0 !important;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        button.btn-overlay {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            color: #ffffff;
            border: 1px solid #444;
            background: #1a1a24;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-active { background: #ffea00 !important; color: #0b0b0f !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        button.btn-overlay.overlay-engaged { background: #00e5ff !important; color: #0b0b0f !important; border-color: #00e5ff !important; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 150px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.4; }
        
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 2; pointer-events: auto; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="controls">
        <div class="upper-deck">
            <div class="control-core">
                <div class="header-row">
                    <button id="uiToggleBtn" title="Toggle UI Controls">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                    <h4 style="margin: 0; color: #00e5ff; font-size: 0.85em; letter-spacing: 0.3px; flex-grow: 1; text-align: left;">Spatial Sculptor</h4>
                </div>
                
                <div class="btn-toolbar" id="toolbarNode">
                    <button id="scanBtn" class="action-btn btn-scan" title="Scan Environment">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path>
                        </svg>
                    </button>
                    <button id="gyroBtn" class="action-btn btn-gyro" title="Toggle Free Walk">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle>
                            <line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line>
                        </svg>
                    </button>
                    <button id="clearBtn" class="action-btn btn-clear" title="Reset Scene">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="cameraWindow">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <img id="libraryPreview" alt="Device selection display element">
                <div id="folderPlaceholder">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <button id="sourceToggleBtn" title="Switch Input Type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div id="lowerContent">
            <div class="input-row">
                <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
                <button id="overlayToggleBtn" class="btn-overlay" title="Toggle Image Alignment Plane">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline>
                    </svg>
                </button>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div id="status">Deconstructing spatial geometry orientation...</div>
            <div id="aiDescription">Awaiting snapshot capture execution sequence...</div>
        </div>
    </div>

    <div id="debugPanel">System Initializing...</div>
    <canvas id="canvas3d"></canvas>

    <script>
        let scene, camera, renderer, controls;
        let videoElement, localStream;
        
        let gyroActive = false;
        let isFirstGyroFrame = false;
        let lockedGyroRoll = 0; 
        const cleanTargetQuaternion = new THREE.Quaternion(); 
        
        let gyroYawOffset = 0;
        let lastCameraQuaternion = new THREE.Quaternion();
        
        let targetLinearVelocityX = 0;
        let targetLinearVelocityZ = 0;
        const VELOCITY_INTERPOLATION_STEP = 0.22; 
        const VELOCITY_DEADZONE_LIMIT = 0.001;

        let motionTracker;
        const LEVEL_PITCH_LIMIT = THREE.MathUtils.degToRad(20);  
        const LEVEL_ROLL_LIMIT = THREE.MathUtils.degToRad(15);   
        const ROTATIONAL_BLANKING_THRESHOLD = 0.005; 
        
        const TRANSLATION_SPEED_SCALAR = 0.65;                   
        let visualTelemetry = { scaleFlow: 0, panFlow: 0, gated: true };
        
        const worldGroup = new THREE.Group();
        let scanInProgress = false;
        
        let dynamicInputSourceMode = 'camera';
        let scannedBackdropDataUrl = null;
        let backdropOverlayActive = false;
        let floatingBackdropMesh = null; 
        let rawCachedShapesArray = null;  

        let telemetryState = { x: 0, y: 0, z: 15 };

        const OPEN_EYE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const CLOSED_EYE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10c4 4 14 4 18 0"/><path d="M6 11.5l-1 2"/><path d="M12 13v3"/></svg>`;

        const ICON_CAMERA_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"/></svg>`;
        const ICON_PHOTO_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"></polyline></svg>`;

        class MultiPointMotionTracker {
            constructor() {
                this.canvas = document.createElement('canvas');
                this.canvas.width = 64;
                this.canvas.height = 64;
                this.ctx = this.canvas.getContext('2d');
                this.prevBuffer = new Uint8ClampedArray(64 * 64);
                this.initialized = false;
                
                this.trackingPoints = [
                    {x: 16, y: 16}, {x: 32, y: 16}, {x: 48, y: 16},
                    {x: 16, y: 32}, {x: 32, y: 32}, {x: 48, y: 32},
                    {x: 16, y: 48}, {x: 32, y: 48}, {x: 48, y: 48}
                ];
            }

            analyze(video) {
                if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return { scale: 0, pan: 0 };
                
                this.ctx.drawImage(video, 0, 0, 64, 64);
                const frameData = this.ctx.getImageData(0, 0, 64, 64).data;
                
                let curBuffer = new Uint8ClampedArray(64 * 64);
                let curTotalLuma = 0;
                let prevTotalLuma = 0;

                for (let i = 0; i < 64 * 64; i++) {
                    curBuffer[i] = (frameData[i*4] + frameData[i*4+1] + frameData[i*4+2]) / 3;
                    curTotalLuma += curBuffer[i];
                    if (this.initialized) prevTotalLuma += this.prevBuffer[i];
                }

                if (!this.initialized) {
                    this.prevBuffer.set(curBuffer);
                    this.initialized = true;
                    return { scale: 0, pan: 0 };
                }

                const lumaBalanceOffset = (curTotalLuma - prevTotalLuma) / 4096.0;

                let totalVectorX = 0;
                let totalExpansion = 0;
                const searchRadius = 5;
                
                let activeMotionBlocksCount = 0;

                for (let pt of this.trackingPoints) {
                    let bestSAD = Infinity;
                    let mvX = 0;
                    let mvY = 0;

                    for (let sy = -searchRadius; sy <= searchRadius; sy++) {
                        for (let sx = -searchRadius; sx <= searchRadius; sx++) {
                            let sad = 0;
                            for (let wy = -1; wy <= 1; wy++) {
                                for (let wx = -1; wx <= 1; wx++) {
                                    const oldX = pt.x + wx;
                                    const oldY = pt.y + wy;
                                    const newX = pt.x + wx + sx;
                                    const newY = pt.y + wy + sy;

                                    if (oldX >= 0 && oldX < 64 && oldY >= 0 && oldY < 64 &&
                                        newX >= 0 && newX < 64 && newY >= 0 && newY < 64) {
                                        const normalizedCurPixel = curBuffer[newY * 64 + newX] - lumaBalanceOffset;
                                        sad += Math.abs(normalizedCurPixel - this.prevBuffer[oldY * 64 + oldX]);
                                    }
                                }
                            }

                            if (sad < bestSAD) {
                                bestSAD = sad;
                                mvX = sx;
                                mvY = sy;
                            }
                        }
                    }

                    if (mvX !== 0 || mvY !== 0) {
                        activeMotionBlocksCount++;
                    }

                    totalVectorX += mvX;
                    const vecFromCenterValX = pt.x - 32;
                    const vecFromCenterValY = pt.y - 32;
                    totalExpansion += (mvX * vecFromCenterValX) + (mvY * vecFromCenterValY);
                }

                this.prevBuffer.set(curBuffer);

                if (activeMotionBlocksCount < 5) {
                    return { scale: 0, pan: 0 };
                }

                let rawPan = -(totalVectorX / 9.0) * 0.25;
                let rawScale = (totalExpansion / 9.0) * 0.015;

                if (Math.abs(rawPan) < 0.14) rawPan = 0;
                if (Math.abs(rawScale) < 0.10) rawScale = 0;

                return {
                    scale: THREE.MathUtils.clamp(rawScale, -0.2, 0.2),
                    pan: THREE.MathUtils.clamp(rawPan, -0.2, 0.2)
                };
            }
        }

        const getSensorQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( alpha, beta, gamma, orient ) {
                const q = new THREE.Quaternion();
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                q.setFromEuler( euler ); 
                q.multiply( q1 ); 
                q.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
                return q;
            };
        })();

        function createRoundedBoxGeometry(w, h, d, radius, segments) {
            w = Math.max(w, 0.05); h = Math.max(h, 0.05); d = Math.max(d, 0.05);
            const r = Math.min(radius, Math.min(w, h) * 0.45);
            const shape = new THREE.Shape();
            const x = -w / 2, y = -h / 2;
            
            shape.moveTo(x, y + r);
            shape.lineTo(x, y + h - r);
            shape.quadraticCurveTo(x, y + h, x + r, y + h);
            shape.lineTo(x + w - r, y + h);
            shape.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
            shape.lineTo(x + w, y + r);
            shape.quadraticCurveTo(x + w, y, x + w - r, y);
            shape.lineTo(x + r, y);
            shape.quadraticCurveTo(x, y, x, y + r);

            const geo = new THREE.ExtrudeGeometry(shape, {
                depth: Math.max(0.01, d - (2 * r)),
                bevelEnabled: true,
                bevelSegments: segments,
                steps: 1,
                bevelSize: r,
                bevelThickness: r,
                curveSegments: segments * 2
            });
            geo.center();
            return geo;
        }

        function extractCleanJsonObject(rawText) {
            const firstOpen = rawText.indexOf('{');
            if (firstOpen === -1) throw new Error("Object boundary missing.");
            let depth = 0;
            for (let i = firstOpen; i < rawText.length; i++) {
                if (rawText[i] === '{') depth++;
                else if (rawText[i] === '}') {
                    depth--;
                    if (depth === 0) return rawText.substring(firstOpen, i + 1);
                }
            }
            throw new Error("Mismatched block bounds.");
        }

        function init3D() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('apiKeyField').value = urlKey.trim();
                document.getElementById('aiDescription').innerHTML = "Ready to scan scene!<br>Gemini API Key loaded.";
            }

            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x06060a);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            initOrbitControls();
            
            motionTracker = new MultiPointMotionTracker();

            const grid = new THREE.GridHelper(4000, 200, 0x1f1f2e, 0x111116);
            grid.position.y = -0.005; 
            scene.add(grid);

            scene.add(new THREE.AmbientLight(0xffffff, 0.35));
            
            const keyLight = new THREE.DirectionalLight(0xfffecb, 1.4);
            keyLight.position.set(15, 25, 20);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 1024;
            keyLight.shadow.mapSize.height = 1024;
            keyLight.shadow.bias = -0.001;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xdbe7ff, 0.5);
            fillLight.position.set(-15, 10, 10);
            scene.add(fillLight);

            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);
            document.getElementById('uiToggleBtn').addEventListener('click', toggleControlPanelsVisibility);
            document.getElementById('overlayToggleBtn').addEventListener('click', toggleSpatialBackdropOverlay);
            
            document.getElementById('sourceToggleBtn').addEventListener('click', toggleInputSourceMode);
            document.getElementById('folderPlaceholder').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('libraryPreview').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('fileInput').addEventListener('change', handleDeviceFileSelection);

            initRearCameraStreamGracefully();
            animate();
        }

        function toggleSpatialBackdropOverlay() {
            const btn = document.getElementById('overlayToggleBtn');
            if (backdropOverlayActive) {
                backdropOverlayActive = false;
                btn.classList.remove('overlay-engaged');
                if (floatingBackdropMesh) floatingBackdropMesh.visible = false;
            } else {
                if (!scannedBackdropDataUrl) return;
                backdropOverlayActive = true;
                btn.classList.add('overlay-engaged');
                if (floatingBackdropMesh) floatingBackdropMesh.visible = true;
            }
        }

        function toggleInputSourceMode(e) {
            if(e) e.stopPropagation();
            
            const camFeed = document.getElementById('cameraFeed');
            const libPreview = document.getElementById('libraryPreview');
            const placeholder = document.getElementById('folderPlaceholder');
            const toggleBtn = document.getElementById('sourceToggleBtn');
            const desc = document.getElementById('aiDescription');

            if (dynamicInputSourceMode === 'camera') {
                dynamicInputSourceMode = 'library';
                toggleBtn.innerHTML = ICON_PHOTO_SVG;
                camFeed.style.display = 'none';
                
                if (libPreview.src && libPreview.src !== window.location.href && libPreview.src !== '') {
                    libPreview.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    libPreview.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
                desc.innerHTML = "Library Mode Active.<br>Tap target frame viewport area to select local data asset.";
            } else {
                dynamicInputSourceMode = 'camera';
                toggleBtn.innerHTML = ICON_CAMERA_SVG;
                libPreview.style.display = 'none';
                placeholder.style.display = 'none';
                camFeed.style.display = 'block';
                desc.innerHTML = "Live Feed Active.<br>Aim camera lens array and tap capture button.";
            }
        }

        function triggerDeviceFileBrowser() {
            if (dynamicInputSourceMode === 'library') {
                document.getElementById('fileInput').click();
            }
        }

        function handleDeviceFileSelection(e) {
            const targetFile = e.target.files[0];
            if (!targetFile) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('libraryPreview');
                const placeholder = document.getElementById('folderPlaceholder');
                
                imgElement.src = event.target.result;
                imgElement.style.display = 'block';
                placeholder.style.display = 'none';
                
                document.getElementById('aiDescription').innerHTML = "Asset loaded cleanly.<br>Ready to sculpt matrix data trees.";
            };
            reader.readAsDataURL(targetFile);
        }

        function toggleControlPanelsVisibility() {
            const toolbar = document.getElementById('toolbarNode');
            const cameraWin = document.getElementById('cameraWindow');
            const lowerContent = document.getElementById('lowerContent');
            const toggleBtn = document.getElementById('uiToggleBtn');

            if (toolbar.style.display === 'none') {
                toolbar.style.display = 'flex';
                cameraWin.style.display = 'block';
                lowerContent.style.display = 'block';
                toggleBtn.innerHTML = OPEN_EYE_SVG;
            } else {
                toolbar.style.display = 'none';
                cameraWin.style.display = 'none';
                lowerContent.style.display = 'none';
                toggleBtn.innerHTML = CLOSED_EYE_SVG;
            }
        }

        function initOrbitControls() {
            if (!controls) {
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
            }
            controls.target.set(0, 0, 0); 
            controls.enabled = true;
        }

        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                videoElement.srcObject = localStream;
            } catch (err) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                } catch (e) {
                    document.getElementById('debugPanel').innerText = "Camera Stream Error";
                }
            }
        }

        const delayExecutionTime = ms => new Promise(res => setTimeout(res, ms));

        async function captureAndScanFrame() {
            if (scanInProgress) return;
            console.clear();
            
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const scanBtn = document.getElementById('scanBtn');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();

            if (!userEnteredKey) {
                descDiv.innerHTML = "<span style='color:#ff3333;'>Authentication Error: Key field cannot be left blank.</span>";
                return;
            }

            const hiddenCanvas = document.createElement('canvas');
            const ctx = hiddenCanvas.getContext('2d');

            if (dynamicInputSourceMode === 'camera') {
                if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                    alert("Camera initialization incomplete.");
                    return;
                }
                hiddenCanvas.width = videoElement.videoWidth;
                hiddenCanvas.height = videoElement.videoHeight;
                ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            } else {
                const libraryImg = document.getElementById('libraryPreview');
                if (!libraryImg.src || libraryImg.style.display === 'none') {
                    alert("Pipeline Error: Please upload an image target inside the source terminal view first.");
                    return;
                }
                hiddenCanvas.width = libraryImg.naturalWidth || 800;
                hiddenCanvas.height = libraryImg.naturalHeight || 600;
                ctx.drawImage(libraryImg, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            }
            
            scannedBackdropDataUrl = hiddenCanvas.toDataURL('image/jpeg');
            const base64Image = scannedBackdropDataUrl.split(',')[1];

            scanInProgress = true;
            scanBtn.disabled = true;
            
            statusDiv.style.display = 'block';
            statusDiv.innerText = "Pass 1: Preparing prompt queries...";
            descDiv.innerHTML = "<span style='color: #00e5ff; font-weight: 500;'>Please be patient while AI analyzes the scene...</span>";

            // Integrated target cascade list minus items 5 and 7
            const modelCascadeList = [
                'gemini-3.5-flash',
                'gemini-3.1-pro-preview',
                'gemini-3-flash-preview',
                'gemini-2.5-pro',
                'gemini-3.1-flash-lite'
            ];
            
            let parsedPayload = null;
            let unifiedShapes = [];
            let successfulPass1Model = "none";
            let debugDiagnosticsHistory = "";

            const pass1Prompt = `
                Act as an expert 3D Computer Vision Spatial Scaffolder. Analyze this image frame carefully.
                Your goal is to deconstruct the visual objects into a highly accurate, tightly fitting spatial blueprint.
                
                Coordinate System Discipline:
                - The absolute center origin of the primary subject matter is at (0, 0, 0).
                - Ground level/floor planes should sit exactly at y = 0.
                - X-axis is horizontal alignment, Y-axis is vertical height, Z-axis is depth.
                - Deconstruct complex assemblies into combinations of small primitives aligned tightly together along shared boundary edges without overlapping gaps.
                
                Your response must populate exactly two fields inside the target JSON object:
                1. description: Provide a detailed architectural analysis of the subjects, their proximity, spatial layout, and structural material properties.
                2. blueprint: A meticulous manifest listing descriptive primitives categorized under logical headers.
                
                Format entry lines exactly like this template:
                "- type=[box|roundedbox|sphere|cylinder|cone|capsule|plane], position=[x,y,z], scale=[x,y,z], rotation=[x,y,z], color=[hex], roughness=[0.0-1.0], metalness=[0.0-1.0], transmission=[0.0-1.0]"
            `;

            pass1ModelLoop: for (let model of modelCascadeList) {
                try {
                    statusDiv.innerText = `Pass 1: Prompting ${model}...`;
                    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + userEnteredKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass1Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: { description: { type: "STRING" }, blueprint: { type: "STRING" } },
                                    required: ["description", "blueprint"]
                                }
                            }
                        })
                    });

                    if (!res.ok) {
                        const errorDetailsText = await res.text();
                        debugDiagnosticsHistory += `• Pass 1 [${model}] Error ${res.status}: ${errorDetailsText.substring(0, 100)}...<br>`;
                        continue;
                    }

                    const data = await res.json();
                    if (data.error) {
                        debugDiagnosticsHistory += `• Pass 1 [${model}] API Error: ${data.error.message}<br>`;
                        continue;
                    }

                    parsedPayload = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                    if (parsedPayload && parsedPayload.blueprint) {
                        successfulPass1Model = model;
                        break pass1ModelLoop; 
                    }
                } catch (e) { 
                    debugDiagnosticsHistory += `• Pass 1 [${model}] Exception: ${e.message}<br>`;
                }
            }

            if (!parsedPayload || !parsedPayload.blueprint) {
                descDiv.innerHTML = `<span style='color:#ff3333; font-weight:bold;'>Pass 1 Fatal Failure</span>`;
                if (debugDiagnosticsHistory) descDiv.innerHTML += `<br><br><div style='width: 100%; background:#221b11; padding:8px;'><b>Error Log:</b><br>${debugDiagnosticsHistory}</div>`;
                scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
                return;
            }

            const structuralTasks = [
                { id: 'FOUNDATION', subId: 'PRIMITIVES', filter: 'Extract only core ground, base support systems, and massive structural floors.' },
                { id: 'CORE_MASSES', subId: 'FURNITURE', filter: 'Extract only the central solid masses, primary object bodies, or large structural parts.' },
                { id: 'EXTENSIONS', subId: 'FRAMES', filter: 'Extract only peripheral appendages, supporting limbs, borders, handles, or armatures.' },
                { id: 'ACCENTS', subId: 'ITEMS', filter: 'Extract fine decorative embellishments, surface accessories, overlays, and small accent details.' }
            ];

            let permanentPass2Logs = "";

            const regionalCompilationPromises = structuralTasks.map(async (task, idx) => {
                await delayExecutionTime(idx * 150);

                const pass2Prompt = `
                    You are a precision 3D Geometry compiler worker focusing strictly on the [${task.id} -> ${task.subId}] layer.
                    Task Directive: ${task.filter}
                    
                    Convert those targeted architectural lines into a highly minified JSON shapes layout array. 
                    Do not extrapolate elements outside your assigned directive scope.
                    
                    MASTER BLUEPRINT TO COMPILE:
                    """
                    ${parsedPayload.blueprint}
                    """
                `;

                for (let model of modelCascadeList) {
                    try {
                        statusDiv.innerText = `Pass 2: Compiling [${task.id}] via ${model}...`;
                        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + userEnteredKey, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: pass2Prompt }] }], 
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            shapes: {
                                                type: "ARRAY",
                                                items: {
                                                    type: "OBJECT",
                                                    properties: {
                                                        t: { type: "STRING", description: "type: box, roundedbox, sphere, cylinder, cone, capsule, plane" }, 
                                                        p: { type: "ARRAY", items: { type: "NUMBER" }, description: "position [x, y, z]" },
                                                        s: { type: "ARRAY", items: { type: "NUMBER" }, description: "scale [x, y, z]" },
                                                        r: { type: "ARRAY", items: { type: "NUMBER" }, description: "rotation [x, y, z] in radians" },
                                                        c: { type: "STRING", description: "hex color code" },
                                                        rough: { type: "NUMBER", description: "roughness float 0.0 to 1.0" },
                                                        metal: { type: "NUMBER", description: "metalness float 0.0 to 1.0" },
                                                        trans: { type: "NUMBER", description: "transmission float 0.0 to 1.0 for translucent structures" }
                                                    },
                                                    required: ["t", "p", "s", "r", "c", "rough", "metal", "trans"]
                                                }
                                            }
                                        },
                                        required: ["shapes"]
                                    }
                                }
                            })
                        });

                        if (res.ok) {
                            const data = await res.json();
                            const parsed = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                            return { id: `${task.id}_${task.subId}`, model: model, shapes: parsed.shapes };
                        } else {
                            permanentPass2Logs += `• Layer [${task.id}_${task.subId}] Fallback: ${model} failed (Status ${res.status})<br>`;
                        }
                    } catch (e) {
                        permanentPass2Logs += `• Layer [${task.id}_${task.subId}] Exception: ${model} encountered tracking error<br>`;
                    }
                }
                return { id: `${task.id}_${task.subId}`, model: "failed", shapes: [] };
            });

            try {
                const compiledResults = await Promise.all(regionalCompilationPromises);
                
                let reportTrackingLog = "<br><br><b>4-Layer Multi-Pass High Fidelity Synthesis Audit:</b>";
                compiledResults.forEach((result) => {
                    unifiedShapes.push(...result.shapes);
                    let modelStatusColor = result.model.includes('pro') || result.model.includes('3.5') ? '#00e676' : '#ffab00';
                    reportTrackingLog += `<br>• Layer [${result.id}] compiled via <span style='color:${modelStatusColor}; font-weight:bold;'>${result.model}</span> (${result.shapes.length} nodes)`;
                });

                let coreLayoutNarrative = `<b>[Orchestrator: ${successfulPass1Model}]</b><br>${parsedPayload.description}`;
                let structuredUiOutput = coreLayoutNarrative + reportTrackingLog;

                if (debugDiagnosticsHistory || permanentPass2Logs) {
                    structuredUiOutput += `<br><br><div style='background:#221b11; border:1px solid #ffab00; padding:8px; border-radius:4px; font-family:monospace; font-size:0.9em; box-sizing:border-box; width:100%;'><b>System Diagnostic Fallback Log Trail:</b><br>${debugDiagnosticsHistory}${permanentPass2Logs}</div>`;
                }

                descDiv.innerHTML = structuredUiOutput;
                if (unifiedShapes.length > 0) renderAIBlueprint(unifiedShapes);
            } catch (err) {
                descDiv.innerHTML = "Pipeline processing exception.";
            }

            scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
        }

        function renderAIBlueprint(shapesArray) {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            worldGroup.position.set(0, 0, 0);

            shapesArray.forEach(shape => {
                let geo;
                const pos = shape.p || [0,0,0];
                const scl = shape.s || [1,1,1];
                const rot = shape.r || [0,0,0];
                const primitiveType = shape.t.toLowerCase().trim();

                switch(primitiveType) {
                    case 'box': 
                        geo = new THREE.BoxGeometry(1, 1, 1); 
                        break;
                    case 'roundedbox': 
                        geo = createRoundedBoxGeometry(scl[0], scl[1], scl[2], Math.min(scl[0], scl[1], scl[2]) * 0.15, 4); 
                        break;
                    case 'sphere': 
                        geo = new THREE.SphereGeometry(0.5, 32, 32); 
                        break;
                    case 'cylinder': 
                        geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32); 
                        break;
                    case 'cone':
                        geo = new THREE.ConeGeometry(0.5, 1, 32);
                        break;
                    case 'capsule':
                        geo = new THREE.CapsuleGeometry(0.4, 0.6, 8, 16);
                        break;
                    case 'plane':
                        geo = new THREE.PlaneGeometry(1, 1);
                        break;
                    default: 
                        geo = new THREE.BoxGeometry(1, 1, 1);
                }

                const isTranslucent = shape.trans > 0.05;
                const mat = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color(shape.c || "#ffffff"),
                    roughness: shape.rough !== undefined ? THREE.MathUtils.clamp(shape.rough, 0, 1) : 0.4,
                    metalness: shape.metal !== undefined ? THREE.MathUtils.clamp(shape.metal, 0, 1) : 0.0,
                    transmission: shape.trans !== undefined ? THREE.MathUtils.clamp(shape.trans, 0, 1) : 0.0,
                    ior: isTranslucent ? 1.52 : 1.0, 
                    thickness: isTranslucent ? 1.0 : 0.0, 
                    transparent: isTranslucent,
                    side: primitiveType === 'plane' ? THREE.DoubleSide : THREE.FrontSide,
                    clearcoat: shape.metal > 0.5 ? 0.3 : 0.0, 
                    clearcoatRoughness: 0.1
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(pos[0], pos[1], pos[2]);
                mesh.rotation.set(rot[0], rot[1], rot[2]);
                
                if (primitiveType !== 'roundedbox') {
                    mesh.scale.set(scl[0], scl[1], scl[2]);
                }
                
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                worldGroup.add(mesh);
            });

            if (worldGroup.children.length > 0) {
                const box = new THREE.Box3().setFromObject(worldGroup);
                const center = new THREE.Vector3(); 
                box.getCenter(center);
                
                worldGroup.position.x = -center.x;
                worldGroup.position.z = -center.z;
                worldGroup.position.y = -box.min.y; 
            }
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                deactivateTrackingSensors();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    Promise.all([
                        DeviceOrientationEvent.requestPermission(),
                        typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function' ? 
                            DeviceMotionEvent.requestPermission() : Promise.resolve('granted')
                    ]).then(states => {
                        if (states.every(s => s === 'granted')) activateTrackingSensors(btn);
                    });
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btn) {
            if (controls) { 
                controls.enabled = false; 
            }
            isFirstGyroFrame = true;
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleInertialStepInput, true);
            gyroActive = true;
            btn.classList.add('btn-active');
        }

        function deactivateTrackingSensors() {
            if (!gyroActive) return;
            window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
            window.removeEventListener('devicemotion', handleInertialStepInput);
            gyroActive = false;
            targetLinearVelocityX = 0;
            targetLinearVelocityZ = 0;
            document.getElementById('gyroBtn').classList.remove('btn-active');
            
            const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            lockedGyroRoll = euler.z; 
            
            euler.z = 0;
            camera.quaternion.setFromEuler(euler);
            camera.updateMatrix();
            camera.updateMatrixWorld(true);
            
            const currentForwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const explicitTargetPoint = new THREE.Vector3().copy(camera.position).addScaledVector(currentForwardDir, 10);
            
            camera.lookAt(explicitTargetPoint);
            
            if (controls) {
                controls.dispose();
            }
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.copy(explicitTargetPoint);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();
        }

        function clearSceneAndResetView() {
            console.clear();
            while(worldGroup.children.length > 0) {
                let c = worldGroup.children[0];
                if(c.geometry) c.geometry.dispose();
                if(c.material) c.material.dispose();
                worldGroup.remove(c);
            }
            deactivateTrackingSensors();
            lockedGyroRoll = 0; 
            targetLinearVelocityX = 0;
            targetLinearVelocityZ = 0;
            rawCachedShapesArray = null;
            scannedBackdropDataUrl = null;
            gyroYawOffset = 0;
            
            camera.position.set(0, 0, 15);
            if (controls) {
                controls.target.set(0, 0, 0); 
                controls.update();
            }
            document.getElementById('aiDescription').innerText = "Workspace cleared. System active.";
        }

        function handleGyroscopeMotionInput(e) {
            if (!gyroActive) return;
            
            let alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            let beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            let gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
            let orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

            let qSensor = getSensorQuaternion(alpha, beta, gamma, orient);
            let sensorEuler = new THREE.Euler().setFromQuaternion(qSensor, 'YXZ');

            if (isFirstGyroFrame) {
                let currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                gyroYawOffset = currentEuler.y - sensorEuler.y;
                isFirstGyroFrame = false;
            }

            sensorEuler.y += gyroYawOffset;
            camera.quaternion.setFromEuler(sensorEuler);
        }

        function handleInertialStepInput(e) {
            if (!gyroActive) return;

            let acc = e.acceleration; 
            if (!acc || acc.x === null) return;

            const currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            const horizonLevelEngaged = (Math.abs(currentEuler.x) <= LEVEL_PITCH_LIMIT && Math.abs(currentEuler.z) <= LEVEL_ROLL_LIMIT);
            
            if (!horizonLevelEngaged) {
                targetLinearVelocityX = 0;
                targetLinearVelocityZ = 0;
                return;
            }

            const localAccelerationVector = new THREE.Vector3(acc.x, acc.y, acc.z);
            const worldSpaceAcceleration = localAccelerationVector.clone().applyQuaternion(camera.quaternion);

            worldSpaceAcceleration.y = 0;

            const hardwareJitterFloor = 0.08; 
            if (worldSpaceAcceleration.length() < hardwareJitterFloor) {
                return;
            }

            const ACCELERATION_INTEGRATION_GAIN_Z = 0.025;
            const ACCELERATION_INTEGRATION_GAIN_X = 0.006; 
            targetLinearVelocityX -= worldSpaceAcceleration.x * ACCELERATION_INTEGRATION_GAIN_X;
            targetLinearVelocityZ -= worldSpaceAcceleration.z * ACCELERATION_INTEGRATION_GAIN_Z;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            let statusHorizonStr = "LOCKED";
            
            if (gyroActive) {
                const currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                
                if (Math.abs(currentEuler.x) <= LEVEL_PITCH_LIMIT && Math.abs(currentEuler.z) <= LEVEL_ROLL_LIMIT) {
                    statusHorizonStr = "LEVEL_WALK";
                } else {
                    statusHorizonStr = "TILT_GATED";
                    targetLinearVelocityX = 0;
                    targetLinearVelocityZ = 0;
                }

                const INTEGRATION_LEAK_DECAY = 0.78;
                targetLinearVelocityX *= INTEGRATION_LEAK_DECAY;
                targetLinearVelocityZ *= INTEGRATION_LEAK_DECAY;

                if (Math.abs(targetLinearVelocityX) < VELOCITY_DEADZONE_LIMIT) targetLinearVelocityX = 0;
                if (Math.abs(targetLinearVelocityZ) < VELOCITY_DEADZONE_LIMIT) targetLinearVelocityZ = 0;

                if (targetLinearVelocityX !== 0 || targetLinearVelocityZ !== 0) {
                    camera.position.x += targetLinearVelocityX;
                    camera.position.z += targetLinearVelocityZ;
                    
                    if (controls) {
                        controls.target.x += targetLinearVelocityX;
                        controls.target.z += targetLinearVelocityZ;
                    }
                }
            }

            if (controls && controls.enabled) {
                controls.update();
                if (!gyroActive && lockedGyroRoll !== 0) {
                    cleanTargetQuaternion.copy(camera.quaternion);
                    camera.rotateZ(lockedGyroRoll);
                }
            }
            
            telemetryState.x = camera.position.x;
            telemetryState.z = camera.position.z;
            
            document.getElementById('debugPanel').innerText = `Coord: X:${telemetryState.x.toFixed(2)} Z:${telemetryState.z.toFixed(2)} | VelX:${targetLinearVelocityX.toFixed(3)} VelZ:${targetLinearVelocityZ.toFixed(3)} Mode:${statusHorizonStr} | Nodes: ${worldGroup.children.length}`;
            
            renderer.render(scene, camera);
            
            if (controls && controls.enabled && !gyroActive && lockedGyroRoll !== 0) {
                camera.quaternion.copy(cleanTargetQuaternion);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init3D();
    </script>
