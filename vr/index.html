<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }

        /* Main Controls Container pinned symmetrically with matching left/right margins */
        #controls { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15,15,22,0.9); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
            box-sizing: border-box;
        }
        
        /* Flex assembly distributes extra space between control stack and camera feed */
        .upper-deck {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: stretch;
            width: 100%;
        }

        /* Fixed width column preserves precise button scaling configurations */
        .control-core {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 170px;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 0;
        }

        .header-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            width: 100%;
        }

        /* Integrated Vector Control Toggle Button */
        #uiToggleBtn { 
            width: 32px; 
            height: 32px; 
            background: #1a1a24; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #uiToggleBtn:active { transform: scale(0.95); }
        #uiToggleBtn svg { display: block; }
        
        /* Right-aligned camera screen with fixed 4:3 dimensions matching the deck height */
        #cameraWindow { 
            width: 120px;
            height: 90px;
            flex-shrink: 0;
            border: 2px solid #00e5ff; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box;
            position: relative;
        }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Multi-source Pipeline Viewport Components */
        #libraryPreview { width: 100%; height: 100%; object-fit: cover; display: none; cursor: pointer; }
        #folderPlaceholder { 
            width: 100%; 
            height: 100%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            background: #111116; 
            cursor: pointer; 
            color: #88889c;
        }
        
        #sourceToggleBtn {
            position: absolute;
            bottom: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: rgba(26,26,36,0.85);
            border: 1px solid #555;
            border-radius: 4px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 12;
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #sourceToggleBtn:hover { border-color: #00e5ff; color: #00e5ff; }
        #sourceToggleBtn svg { display: block; pointer-events: none; }

        .btn-toolbar { display: flex; gap: 8px; width: 100%; margin: 0; }
        
        button.action-btn { 
            flex: 1; 
            aspect-ratio: 1;
            background: #1a1a24; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button.action-btn svg { display: block; }
        
        button.btn-scan { color: #00e676; border-color: #00e676; } 
        button.btn-gyro { color: #ffea00; border-color: #ffea00; } 
        button.btn-clear { color: #ff1744; border-color: #ff1744; } 
        
        /* Interactive Input Alignment Structure */
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
        }
        .key-input {
            flex: 1;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 0 !important;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        /* Alignment Backdrop Toggle Control */
        button.btn-overlay {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            color: #ffffff;
            border: 1px solid #444;
            background: #1a1a24;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button.btn-overlay svg { display: block; pointer-events: none; }
        
        /* System-Wide Toggled Operational States */
        .btn-active { background: #ffea00 !important; color: #0b0b0f !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        button.btn-overlay.overlay-engaged { background: #00e5ff !important; color: #0b0b0f !important; border-color: #00e5ff !important; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 150px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.4; }
        
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 2; pointer-events: auto; }
    </style>

    <!-- UI/UX Infrastructure Script CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Restored Extension Layer: Direct client-side GPU/CPU Isosurface Volumetric Extract Engine -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/MarchingCubes.js"></script>
</head>
<body>

    <div id="controls">
        <div class="upper-deck">
            <div class="control-core">
                <div class="header-row">
                    <button id="uiToggleBtn" title="Toggle UI Controls">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                    <h4 style="margin: 0; color: #00e5ff; font-size: 0.85em; letter-spacing: 0.3px; flex-grow: 1; text-align: left;">Spatial Sculptor</h4>
                </div>
                
                <div class="btn-toolbar" id="toolbarNode">
                    <button id="scanBtn" class="action-btn btn-scan" title="Scan Surroundings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                            <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                            <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                            <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                        </svg>
                    </button>
                    <button id="gyroBtn" class="action-btn btn-gyro" title="Enable Gyro & Inertial Walk">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </button>
                    <button id="clearBtn" class="action-btn btn-clear" title="Clear Scene & Reset View">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="cameraWindow">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <img id="libraryPreview" alt="Device selection display element">
                <div id="folderPlaceholder">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <button id="sourceToggleBtn" title="Switch Input Type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div id="lowerContent">
            <div class="input-row">
                <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
                <button id="overlayToggleBtn" class="btn-overlay" title="Toggle Spatial Backdrop Reference">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </button>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div id="status">Analyzing live frame parameters...</div>
            <div id="aiDescription">Ready to scan scene!<br>Aim camera and tap capture button to scan.</div>
        </div>
    </div>

    <div id="debugPanel">
        Cam: Initializing... | Sensors: Inactive
    </div>

    <canvas id="canvas3d"></canvas>

    <script>
        const ACCEL_GAIN       = 0.35; 
        const ACCEL_DEADZONE   = 0.35; 
        const SPIN_KILL_LIMIT  = 4.5;  
        const SLIDE_FRICTION   = 0.80; 
        const MAX_SPEED_CEILING = 0.60; 

        let scene, camera, renderer, controls;
        let videoElement, localStream;
        let gyroActive = false;
        const worldGroup = new THREE.Group();

        let targetVelocity = new THREE.Vector3();
        let currentVelocity = new THREE.Vector3();
        let hardwareActivelySpinning = false;
        let scanInProgress = false;

        let dynamicInputSourceMode = 'camera';
        
        let scannedBackdropDataUrl = null;
        let backdropOverlayActive = false;
        let floatingBackdropMesh = null; 
        let rawCachedShapesArray = null;  

        let telemetryState = {
            alpha: 0, beta: 0, gamma: 0,
            x: 0, y: 5, z: 15
        };

        const OPEN_EYE_SVG = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        `;

        const CLOSED_EYE_SVG = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M3 10c4 4 14 4 18 0"/>
                <path d="M6 11.5l-1 2"/>
                <path d="M9 12.5v2.5"/>
                <path d="M12 13v3"/>
                <path d="M15 12.5v2.5"/>
                <path d="M18 11.5l1 2"/>
            </svg>
        `;

        const ICON_CAMERA_SVG = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        `;

        const ICON_PHOTO_SVG = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
        `;

        // Mathematical Polynomial Smooth Minimum for Continuous SDF Metamorphic Fusions
        function smoothMin(d1, d2, k) {
            const h = Math.max(k - Math.abs(d1 - d2), 0.0) / k;
            return Math.min(d1, d2) - h * h * h * k * (1.0 / 6.0);
        }

        const setObjectQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( quaternion, alpha, beta, gamma, orient ) {
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                quaternion.setFromEuler( euler ); 
                quaternion.multiply( q1 ); 
                quaternion.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
            };
        })();

        function extractCleanJsonObject(rawText) {
            const firstOpen = rawText.indexOf('{');
            if (firstOpen === -1) throw new Error("No object initialization vector located.");
            
            let braceDepth = 0;
            for (let i = firstOpen; i < rawText.length; i++) {
                if (rawText[i] === '{') braceDepth++;
                else if (rawText[i] === '}') {
                    braceDepth--;
                    if (braceDepth === 0) {
                        return rawText.substring(firstOpen, i + 1);
                    }
                }
            }
            throw new Error("Mismatched object encapsulation boundaries detected.");
        }

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            initOrbitControls();

            const grid = new THREE.GridHelper(50, 25, 0x00e5ff, 0x1f1f2e);
            grid.position.y = -3;
            scene.add(grid);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(20, 40, 25);
            scene.add(keyLight);

            const rimLight = new THREE.DirectionalLight(0xff007f, 0.45);
            rimLight.position.set(-20, 20, -20);
            scene.add(rimLight);

            const fillLight = new THREE.DirectionalLight(0x00e5ff, 0.5);
            fillLight.position.set(-15, 10, 15);
            scene.add(fillLight);

            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);
            document.getElementById('uiToggleBtn').addEventListener('click', toggleControlPanelsVisibility);
            
            document.getElementById('sourceToggleBtn').addEventListener('click', toggleInputSourceMode);
            document.getElementById('folderPlaceholder').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('libraryPreview').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('fileInput').addEventListener('change', handleDeviceFileSelection);

            document.getElementById('overlayToggleBtn').addEventListener('click', toggleSpatialBackdropOverlay);

            initRearCameraStreamGracefully();

            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('apiKeyField').value = urlKey.trim();
                document.getElementById('aiDescription').innerHTML = "Ready to scan scene!<br>Gemini API Key loaded automatically from URL.";
            }

            animate();
        }

        function toggleSpatialBackdropOverlay() {
            const btn = document.getElementById('overlayToggleBtn');
            const desc = document.getElementById('aiDescription');

            if (backdropOverlayActive) {
                backdropOverlayActive = false;
                btn.classList.remove('overlay-engaged');
                if (floatingBackdropMesh) floatingBackdropMesh.visible = false;
            } else {
                if (!scannedBackdropDataUrl) {
                    desc.innerHTML = "<span style='color: #ffab00;'>Alignment Error:</span><br>No captured matrix frame found. Execute a scene scan first.";
                    return;
                }
                backdropOverlayActive = true;
                btn.classList.add('overlay-engaged');
                
                if (floatingBackdropMesh) {
                    floatingBackdropMesh.visible = true;
                } else if (rawCachedShapesArray) {
                    renderAIBlueprint(rawCachedShapesArray);
                }
            }
        }

        function toggleInputSourceMode(e) {
            if(e) e.stopPropagation();
            
            const camFeed = document.getElementById('cameraFeed');
            const libPreview = document.getElementById('libraryPreview');
            const placeholder = document.getElementById('folderPlaceholder');
            const toggleBtn = document.getElementById('sourceToggleBtn');
            const desc = document.getElementById('aiDescription');

            if (dynamicInputSourceMode === 'camera') {
                dynamicInputSourceMode = 'library';
                toggleBtn.innerHTML = ICON_PHOTO_SVG;
                camFeed.style.display = 'none';
                
                if (libPreview.src && libPreview.src !== window.location.href && libPreview.src !== '') {
                    libPreview.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    libPreview.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
                desc.innerHTML = "Library Mode Active.<br>Tap screen viewport area to select file.";
            } else {
                dynamicInputSourceMode = 'camera'; 
                toggleBtn.innerHTML = ICON_CAMERA_SVG;
                libPreview.style.display = 'none';
                placeholder.style.display = 'none';
                camFeed.style.display = 'block';
                desc.innerHTML = "Live Feed Active.<br>Aim camera and tap capture button to scan.";
            }
        }

        function triggerDeviceFileBrowser() {
            if (dynamicInputSourceMode === 'library') {
                document.getElementById('fileInput').click();
            }
        }

        function handleDeviceFileSelection(e) {
            const targetFile = e.target.files[0];
            if (!targetFile) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('libraryPreview');
                const placeholder = document.getElementById('folderPlaceholder');
                
                imgElement.src = event.target.result;
                imgElement.style.display = 'block';
                placeholder.style.display = 'none';
                
                document.getElementById('aiDescription').innerHTML = "Asset uploaded cleanly.<br>Ready to sculpt matrix data structures.";
            };
            reader.readAsDataURL(targetFile);
        }

        function toggleControlPanelsVisibility() {
            const toolbar = document.getElementById('toolbarNode');
            const cameraWin = document.getElementById('cameraWindow');
            const lowerContent = document.getElementById('lowerContent');
            const debugPanel = document.getElementById('debugPanel');
            const toggleBtn = document.getElementById('uiToggleBtn');

            if (toolbar.style.display === 'none') {
                toolbar.style.display = 'flex';
                cameraWin.style.display = 'block';
                lowerContent.style.display = 'block';
                debugPanel.style.display = 'block';
                toggleBtn.innerHTML = OPEN_EYE_SVG;
                toggleBtn.style.color = '#ffffff';
                toggleBtn.style.borderColor = '#444';
            } else {
                toolbar.style.display = 'none';
                cameraWin.style.display = 'none';
                lowerContent.style.display = 'none';
                debugPanel.style.display = 'none';
                toggleBtn.innerHTML = CLOSED_EYE_SVG;
                toggleBtn.style.color = '#ffffff';
                toggleBtn.style.borderColor = '#444';
            }
        }

        function initOrbitControls() {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
        }

        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            const debugLog = document.getElementById('debugPanel');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                debugLog.innerText = "Cam: Secure Context Required.";
                return;
            }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                videoElement.srcObject = localStream;
            } catch (err) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                } catch (fallbackErr) {
                    debugLog.innerText = "Cam: Blocked";
                }
            }
        }

        async function captureAndScanFrame() {
            if (scanInProgress) return;
            
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const scanBtn = document.getElementById('scanBtn');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();

            if (!userEnteredKey) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = "Authentication Error:\nPlease enter a valid Gemini API Key.";
                return;
            }

            const hiddenCanvas = document.createElement('canvas');
            const ctx = hiddenCanvas.getContext('2d');

            if (dynamicInputSourceMode === 'camera') {
                if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                    alert("Camera feed stream is initializing.");
                    return;
                }
                hiddenCanvas.width = videoElement.videoWidth;
                hiddenCanvas.height = videoElement.videoHeight;
                ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            } else {
                const libraryImg = document.getElementById('libraryPreview');
                if (!libraryImg.src || libraryImg.style.display === 'none') {
                    alert("Pipeline Error: Please choose an image target inside the source terminal view.");
                    return;
                }
                hiddenCanvas.width = libraryImg.naturalWidth || 800;
                hiddenCanvas.height = libraryImg.naturalHeight || 600;
                ctx.drawImage(libraryImg, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            }
            
            scannedBackdropDataUrl = hiddenCanvas.toDataURL('image/jpeg');
            const base64Image = scannedBackdropDataUrl.split(',')[1];

            scanInProgress = true;
            scanBtn.disabled = true;
            scanBtn.style.opacity = "0.4";
            statusDiv.style.display = 'block';

            const priorityModels = ['gemini-2.5-flash', 'gemini-3.5-flash', 'gemini-3.1-flash-lite'];
            let forensicTextBlueprint = "";
            let finalShapesPayload = null;
            let finalErrorMessage = "Network pipeline error.";

            // PASS 1: THE SPATIAL ARCHITECT
            const pass1Prompt = `
                Act as a Lead 3D Spatial Systems Architect. Analyze this image frame and plan out an intricate, highly granular sculptural block assembly.
                You must explicitly map complex contours and anatomies into independent sub-components (e.g., separating a figure into cranium layers, chin wedges, upper spine cylinders, multiple interlocking ribs, distinct shoulder sockets, upper arm sections, lower arm rods, hands, and environment nodes).
                
                CRITICAL FIX - ABSOLUTE COORDINATE LEDGER MANDATE:
                You must write an exhaustive textual design list of between 40 and 80 individual primitives.
                For EVERY single component, you are STRICTLY FORBIDDEN from using purely relative text descriptions like "anchored to arm". 
                Instead, you MUST use your internal spatial reasoning to calculate and write down absolute numerical vectors:
                - type (box, roundedbox, sphere, cylinder, cone, capsule, torus)
                - material (porcelain, wood)
                - hex color string
                - absolute position [x, y, z] as numbers (Ground floor level is fixed at y=-3)
                - absolute scale [x, y, z] as numbers
                - absolute rotation [x, y, z] as numbers
                
                Format each component in the text string strictly like this so it can be parsed downstream:
                "Component [ID]: type=[type], material=[material], color=[hex], position=[x,y,z], scale=[x,y,z], rotation=[x,y,z]"
            `;

            for (let currentModel of priorityModels) {
                if (forensicTextBlueprint) break;
                try {
                    descDiv.style.color = "#ffab00";
                    descDiv.innerText = `Pass 1/2: Spatial Reasoning Engine Thinking...\n(${currentModel})`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass1Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: { desc: { type: "STRING" } },
                                    required: ["desc"]
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const verifiedJsonString = extractCleanJsonObject(data.candidates[0].content.parts[0].text);
                        const parsed = JSON.parse(verifiedJsonString);
                        forensicTextBlueprint = parsed.desc;
                    }
                } catch (err) {
                    finalErrorMessage = `Pass 1 Failed: ${err.message}`;
                }
            }

            if (!forensicTextBlueprint) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = `Scan Error at Pass 1:\n${finalErrorMessage}`;
                scanInProgress = false; scanBtn.disabled = false; scanBtn.style.opacity = "1"; statusDiv.style.display = 'none';
                return;
            }

            // PASS 2: THE DATA TRANSLATOR
            const pass2Prompt = `
                You are a pure data compilation script. Do not invent shapes or alter layout choices.
                Read the following detailed layout text and convert every single logged component directly into items inside the strict JSON array schema.

                EXPLICIT CAD BLUEPRINT:
                "${forensicTextBlueprint}"

                COMPILATION RULES:
                1. Map every element recorded in the text manifest into an object inside the "shapes" array.
                2. Do not skip components or leave values empty. 
                3. Map position, scale, and rotation directly into arrays of numbers matching the parsed ledger vectors.
            `;

            for (let currentModel of priorityModels) {
                if (finalShapesPayload) break;
                try {
                    descDiv.style.color = "#ffab00";
                    descDiv.innerText = `Pass 2/2: Mapping Data Matrix...\n(${currentModel})`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass2Prompt }] }], 
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        shapes: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: {
                                                    t: { type: "STRING" },
                                                    m: { type: "STRING" },
                                                    c: { type: "STRING" },
                                                    p: { type: "ARRAY", items: { type: "NUMBER" } },
                                                    s: { type: "ARRAY", items: { type: "NUMBER" } },
                                                    r: { type: "ARRAY", items: { type: "NUMBER" } },
                                                    g: { type: "INTEGER" }
                                                },
                                                required: ["t", "m", "c", "p", "s", "r"]
                                            }
                                        }
                                    },
                                    required: ["shapes"]
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const verifiedJsonString = extractCleanJsonObject(data.candidates[0].content.parts[0].text);
                        const parsed = JSON.parse(verifiedJsonString);
                        if (parsed && Array.isArray(parsed.shapes)) {
                            finalShapesPayload = parsed.shapes;
                        }
                    }
                } catch (err) {
                    finalErrorMessage = `Pass 2 Failed: ${err.message}`;
                }
            }

            if (finalShapesPayload) {
                descDiv.style.color = "#fff";
                descDiv.innerText = forensicTextBlueprint; 
                rawCachedShapesArray = finalShapesPayload; 
                renderAIBlueprint(finalShapesPayload);
            } else {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = `Scan Error at Pass 2:\n${finalErrorMessage}`;
            }

            scanInProgress = false;
            scanBtn.disabled = false;
            scanBtn.style.opacity = "1";
            statusDiv.style.display = 'none';
        }

        // --- BROWSER-SIDE VOLUMETRIC IMPLICIT FIELD GENERATOR ---
        function renderAIBlueprint(shapesArray) {
            // Flush tracking workspace groups clean
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (floatingBackdropMesh) {
                if (floatingBackdropMesh.geometry) floatingBackdropMesh.geometry.dispose();
                if (floatingBackdropMesh.material) {
                    if (floatingBackdropMesh.material.map) floatingBackdropMesh.material.map.dispose();
                    floatingBackdropMesh.material.dispose();
                }
                scene.remove(floatingBackdropMesh);
                floatingBackdropMesh = null;
            }

            if (!shapesArray || shapesArray.length === 0) return;

            // Step 1: Compute global coordinate boundaries to fit the Marching Cubes bounding container
            let minB = new THREE.Vector3(Infinity, Infinity, Infinity);
            let maxB = new THREE.Vector3(-Infinity, -Infinity, -Infinity);

            shapesArray.forEach(s => {
                const p = s.p || [0,0,0];
                const size = s.s || [1,1,1];
                const padding = Math.max(size[0], size[1], size[2]);
                minB.x = Math.min(minB.x, p[0] - padding);
                minB.y = Math.min(minB.y, p[1] - padding);
                minB.z = Math.min(minB.z, p[2] - padding);
                maxB.x = Math.max(maxB.x, p[0] + padding);
                maxB.y = Math.max(maxB.y, p[1] + padding);
                maxB.z = Math.max(maxB.z, p[2] + padding);
            });

            // Enforce size minimum constraints
            let centerPoint = new THREE.Vector3().addVectors(minB, maxB).multiplyScalar(0.5);
            let sizeSpan = new THREE.Vector3().subVectors(maxB, minB);
            sizeSpan.x = Math.max(sizeSpan.x, 4.0);
            sizeSpan.y = Math.max(sizeSpan.y, 4.0);
            sizeSpan.z = Math.max(sizeSpan.z, 4.0);

            // Step 2: Initialize Marching Cubes workspace structure
            const resolution = 40; 
            const volumeMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                roughness: 0.12,
                metalness: 0.05,
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                vertexColors: true, 
                side: THREE.DoubleSide
            });

            // Instantiate native extraction layer script extension component hooks
            const marchingCubes = new THREE.MarchingCubes(resolution, volumeMaterial, true, true);
            marchingCubes.position.copy(centerPoint);
            marchingCubes.scale.set(sizeSpan.x * 0.5, sizeSpan.y * 0.5, sizeSpan.z * 0.5);

            // Reset field buffers
            marchingCubes.reset();

            // Step 3: Map the discrete primitives into a smooth, unified 3D continuous volume field
            const size3 = resolution * resolution * resolution;
            const resMinus = resolution - 1;

            for (let i = 0; i < resolution; i++) {
                // Normalize local marching cubes space back to calculated object space [-1, 1]
                let nx = (i / resMinus) * 2.0 - 1.0; 
                let wx = centerPoint.x + nx * (sizeSpan.x * 0.5);

                for (let j = 0; j < resolution; j++) {
                    let ny = (j / resMinus) * 2.0 - 1.0;
                    let wy = centerPoint.y + ny * (sizeSpan.y * 0.5);

                    for (let k = 0; k < resolution; k++) {
                        let nz = (k / resMinus) * 2.0 - 1.0;
                        let wz = centerPoint.z + nz * (sizeSpan.z * 0.5);

                        let finalDensity = 0.0;
                        let rAccum = 0, gAccum = 0, bAccum = 0, weightSum = 0.0001;

                        // Evaluate how each shape interacts with this individual voxel point
                        shapesArray.forEach(shape => {
                            const p = shape.p || [0,0,0];
                            const s = shape.s || [1,1,1];
                            const type = (shape.t || 'sphere').toLowerCase().trim();

                            // Distance evaluation vector
                            let dx = (wx - p[0]) / (s[0] || 1);
                            let dy = (wy - p[1]) / (s[1] || 1);
                            let dz = (wz - p[2]) / (s[2] || 1);
                            let localDist = 0.0;

                            if (type === 'box' || type === 'roundedbox') {
                                let bx = Math.abs(dx) - 1.0;
                                let by = Math.abs(dy) - 1.0;
                                let bz = Math.abs(dz) - 1.0;
                                localDist = Math.sqrt(Math.max(bx, 0)**2 + Math.max(by, 0)**2 + Math.max(bz, 0)**2);
                            } else {
                                // Default analytical metric fallback (Sphere / Capsule envelope tracking)
                                localDist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                            }

                            // Metafield Density Kernel Falloff Equation: H(d) = max(0, 1 - d^2)^3
                            let densityContrib = Math.max(0, 1.0 - (localDist * 0.75));
                            let densityKernel = densityContrib * densityContrib * densityContrib;
                            
                            finalDensity += densityKernel;

                            // Dynamic spatial tracking mapping for vertex colors
                            if (densityKernel > 0.01) {
                                const cStr = shape.c || "#ffffff";
                                const r = parseInt(cStr.substring(1,3), 16) / 255;
                                const g = parseInt(cStr.substring(3,5), 16) / 255;
                                const b = parseInt(cStr.substring(5,7), 16) / 255;

                                rAccum += r * densityKernel;
                                gAccum += g * densityKernel;
                                bAccum += b * densityKernel;
                                weightSum += densityKernel;
                            }
                        });

                        // Populate the standard data tables inside MarchingCubes
                        const bufferIdx = i + j * resolution + k * resolution * resolution;
                        marchingCubes.field[bufferIdx] = finalDensity;

                        // Inject blended vertex colors into tracking fields
                        marchingCubes.colorField[bufferIdx * 3]     = rAccum / weightSum;
                        marchingCubes.colorField[bufferIdx * 3 + 1] = gAccum / weightSum;
                        marchingCubes.colorField[bufferIdx * 3 + 2] = bAccum / weightSum;
                    }
                }
            }

            // Fire geometry isosurface extraction pipeline loop pass routines
            marchingCubes.isolation_level = 0.35; 
            marchingCubes.update();
            worldGroup.add(marchingCubes);

            // 3D SPATIAL ENVELOPE BACKDROP SNAPPING LAYERS
            if (scannedBackdropDataUrl) {
                const spatialTexture = new THREE.TextureLoader().load(scannedBackdropDataUrl);
                const billboardGeo = new THREE.PlaneGeometry(1, 1);
                const billboardMat = new THREE.MeshBasicMaterial({
                    map: spatialTexture,
                    transparent: true,
                    opacity: 0.45,
                    side: THREE.DoubleSide,
                    depthWrite: false 
                });

                floatingBackdropMesh = new THREE.Mesh(billboardGeo, billboardMat);
                const zBackstopOffset = centerPoint.z - (sizeSpan.z * 0.5) - 0.75;
                floatingBackdropMesh.position.set(centerPoint.x, centerPoint.y, zBackstopOffset);

                floatingBackdropMesh.scale.set(Math.max(sizeSpan.x, 3.0), Math.max(sizeSpan.y, 3.0), 1);
                floatingBackdropMesh.visible = backdropOverlayActive;
                scene.add(floatingBackdropMesh);
            }
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                deactivateTrackingSensors();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(orientState => {
                            if (orientState === 'granted') {
                                DeviceMotionEvent.requestPermission().then(motionState => {
                                    if(motionState === 'granted') activateTrackingSensors(btn);
                                });
                            }
                        }).catch(err => console.error(err));
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btnElement) {
            if (controls) { controls.dispose(); controls = null; }
            targetVelocity.set(0,0,0); currentVelocity.set(0,0,0);
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleHardwareInertialSensors, true);
            gyroActive = true;
            btnElement.classList.add('btn-active');
            document.getElementById('debugPanel').innerText = "Sensors: Active | Horizontal Walking Engage";
        }

        function deactivateTrackingSensors() {
            if (!gyroActive) return;
            window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
            window.removeEventListener('devicemotion', handleHardwareInertialSensors);
            gyroActive = false;
            document.getElementById('gyroBtn').classList.remove('btn-active');
            
            targetVelocity.set(0,0,0);
            currentVelocity.set(0,0,0);
            hardwareActivelySpinning = false;
            
            initOrbitControls();
            document.getElementById('debugPanel').innerText = "Cam: Ready | Sensors: Inactive";
        }

        function clearSceneAndResetView() {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (floatingBackdropMesh) {
                if (floatingBackdropMesh.geometry) floatingBackdropMesh.geometry.dispose();
                if (floatingBackdropMesh.material) {
                    if (floatingBackdropMesh.material.map) floatingBackdropMesh.material.map.dispose();
                    floatingBackdropMesh.material.dispose();
                }
                scene.remove(floatingBackdropMesh);
                floatingBackdropMesh = null;
            }

            deactivateTrackingSensors();

            rawCachedShapesArray = null;
            scannedBackdropDataUrl = null;
            backdropOverlayActive = false;
            document.getElementById('overlayToggleBtn').classList.remove('overlay-engaged');

            telemetryState.x = 0; telemetryState.y = 5; telemetryState.z = 15;
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);
            camera.rotation.set(0, 0, 0);
            camera.quaternion.set(0, 0, 0, 1);
            
            if (!controls) initOrbitControls();
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('aiDescription').innerText = "Scene reset. Ready to scan.";
        }

        function handleGyroscopeMotionInput(event) {
            if (!gyroActive) return;
            const alpha = (event.alpha !== null && !isNaN(event.alpha)) ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = (event.beta !== null && !isNaN(event.beta)) ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = (event.gamma !== null && !isNaN(event.gamma)) ? THREE.MathUtils.degToRad(event.gamma) : 0;
            const screenAngle = (window.screen && window.screen.orientation && !isNaN(window.screen.orientation.angle)) ? window.screen.orientation.angle : (window.orientation || 0);
            setObjectQuaternion(camera.quaternion, alpha, beta, gamma, THREE.MathUtils.degToRad(screenAngle));
        }

        function handleHardwareInertialSensors(event) {
            if (!gyroActive) return;
            const r = event.rotationRate; const accel = event.acceleration;
            if (!r || !accel || accel.x === null || accel.z === null) return;

            if (Math.abs(r.alpha || 0) > SPIN_KILL_LIMIT || Math.abs(r.beta || 0) > SPIN_KILL_LIMIT || Math.abs(r.gamma || 0) > SPIN_KILL_LIMIT) {
                hardwareActivelySpinning = true; 
                targetVelocity.set(0, 0, 0); 
                return;
            }
            hardwareActivelySpinning = false;

            let ax = accel.x; 
            let az = accel.z; 

            if (Math.abs(ax) < ACCEL_DEADZONE) ax = 0;
            if (Math.abs(az) < ACCEL_DEADZONE) az = 0;

            if (ax !== 0 || az !== 0) {
                let forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0; 
                
                if (forward.lengthSq() < 0.01) {
                    forward.set(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0;
                }
                forward.normalize();

                let right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                let horizontalMove = new THREE.Vector3();
                horizontalMove.addScaledVector(right, ax);
                horizontalMove.addScaledVector(forward, -az); 
                horizontalMove.normalize();

                targetVelocity.copy(horizontalMove).setLength(Math.sqrt(ax * ax + az * az) * ACCEL_GAIN);
            } else {
                targetVelocity.multiplyScalar(SLIDE_FRICTION);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) {
                controls.update(); 
            } else {
                currentVelocity.lerp(targetVelocity, 0.25);
                if (currentVelocity.length() > MAX_SPEED_CEILING) currentVelocity.setLength(MAX_SPEED_CEILING);
                
                if (currentVelocity.lengthSq() > 0.00001) camera.position.add(currentVelocity);
                else currentVelocity.set(0, 0, 0);
                
                telemetryState.x = camera.position.x; telemetryState.z = camera.position.z;
            }
            
            document.getElementById('debugPanel').innerText = `Source: ${dynamicInputSourceMode.toUpperCase()} | Cam Coord: X:${telemetryState.x.toFixed(1)} Z:${telemetryState.z.toFixed(1)} | Sensors: ${gyroActive ? 'Active' : 'Inactive'}`;
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;
    </script>
</body>
