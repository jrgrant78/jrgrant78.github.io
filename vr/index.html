<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }
        
        /* Mobile UI Overlay Controls Container */
        #controls { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(15,15,22,0.9); padding: 15px; border-radius: 8px; border: 1px solid #333; width: 200px; box-shadow: 0 4px 25px rgba(0,0,0,0.8); }
        
        /* Small Upper-Right Camera View Window */
        #cameraWindow { position: absolute; top: 10px; right: 10px; z-index: 10; width: 120px; height: 90px; border: 2px solid #00e5ff; border-radius: 6px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; }
        
        /* Consistent Icon Toolbar Grid Layout */
        .btn-toolbar { display: flex; gap: 8px; margin-top: 10px; width: 100%; }
        
        /* Highly Consistent Icon Sizing Sheet */
        button { 
            flex: 1; 
            aspect-ratio: 1; 
            background: #1a1a24; 
            color: #fff; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.4em; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-scan { color: #00e5ff; border-color: #00e5ff; }
        .btn-gyro { color: #ff007f; border-color: #ff007f; }
        .btn-clear { color: #ffab00; border-color: #ffab00; }
        
        .btn-active { background: #ff007f !important; color: #fff !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        
        .key-input {
            width: 100%;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 140px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.35; }
        
        /* Hardware Live Debugger Panel */
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { width: 100vw; height: 100vh; display: block; }
    </style>

    <!-- Production 3D Framework Pipeline CDN Links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- Upper Right Video Feed Window Component -->
    <div id="cameraWindow">
        <video id="cameraFeed" autoplay playsinline muted></video>
    </div>

    <!-- UI Overlay Layout Controls -->
    <div id="controls">
        <h4 style="margin: 0 0 5px 0; color: #00e5ff; text-align: center;">Spatial Sculptor</h4>
        
        <div class="btn-toolbar">
            <button id="scanBtn" class="btn-scan" title="Scan Surroundings">⛶</button>
            <button id="gyroBtn" class="btn-gyro" title="Enable Gyro & Inertial Walk">🕧</button>
            <button id="clearBtn" class="btn-clear" title="Clear Scene & Reset View">🗑</button>
        </div>

        <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
        
        <div id="status">Analyzing live frame parameters...</div>
        <div id="aiDescription">Ready to scan scene!<br>Aim camera and tap ⛶ to scan.</div>
    </div>

    <div id="debugPanel">
        Cam: Initializing... | Sensors: Inactive
    </div>

    <canvas id="canvas3d"></canvas>

    <script>
        // =========================================================================
        // PURE HARDWARE INERTIAL TUNING BLOCK
        // =========================================================================
        const ACCEL_GAIN       = 0.35; 
        const ACCEL_DEADZONE   = 0.30; 
        const SPIN_KILL_LIMIT  = 14.0; 
        const SLIDE_FRICTION   = 0.85; 
        const MAX_SPEED_CEILING = 0.60; 
        // =========================================================================

        let scene, camera, renderer, controls;
        let videoElement, localStream;
        let gyroActive = false;
        const worldGroup = new THREE.Group();

        let targetVelocity = new THREE.Vector3();
        let currentVelocity = new THREE.Vector3();
        let hardwareActivelySpinning = false;

        let telemetryState = {
            alpha: 0, beta: 0, gamma: 0,
            x: 0, y: 5, z: 15
        };

        const setObjectQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( quaternion, alpha, beta, gamma, orient ) {
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                quaternion.setFromEuler( euler ); 
                quaternion.multiply( q1 ); 
                quaternion.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
            };
        })();

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            initOrbitControls();

            const grid = new THREE.GridHelper(50, 25, 0x00e5ff, 0x1f1f2e);
            grid.position.y = -3;
            scene.add(grid);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            
            // Three-Point Lighting Setup to show off complex geometries
            const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
            keyLight.position.set(15, 35, 20);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x00e5ff, 0.35);
            fillLight.position.set(-15, 15, -10);
            scene.add(fillLight);

            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);

            initRearCameraStreamGracefully();
            animate();
        }

        function initOrbitControls() {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
        }

        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            const descDiv = document.getElementById('aiDescription');
            const debugLog = document.getElementById('debugPanel');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                debugLog.innerText = "Cam: Secure Context Required.";
                return;
            }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                videoElement.srcObject = localStream;
            } catch (err) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                } catch (fallbackErr) {
                    debugLog.innerText = "Cam: Blocked";
                }
            }
        }

        // --- EXHAUSTIVE FORENSIC ANALYSIS PROMPT ENGINE ---
        async function captureAndScanFrame() {
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();

            if (!userEnteredKey) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = "Authentication Error:\nPlease input a valid Gemini API Key.";
                return;
            }

            if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                alert("Camera feed stream is initializing.");
                return;
            }

            statusDiv.style.display = 'block';

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = videoElement.videoWidth;
            hiddenCanvas.height = videoElement.videoHeight;
            const ctx = hiddenCanvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            const base64Image = hiddenCanvas.toDataURL('image/jpeg').split(',')[1];

            const promptText = `
                You are a high-fidelity spatial scanning system and master parametric modeler. 
                Analyze the provided camera frame with absolute, forensic literalism.

                1. EXHAUSTIVE FORENSIC DESCRIPTION: Under the "description" key, write a dense, hyper-detailed breakdown describing every visible feature down to the last detail. You must explicitly log:
                   - The precise identification, physical placement, and structural orientation of all objects.
                   - Distances, depth layers, and precise geometric relations between adjacent subjects.
                   - Visible textures, material finishes, color gradations, and the exact direction/angles of real-world light sources striking the scene.

                2. SOLID COMPONENT MODELING: Recreate these elements using dense, continuous structural assemblies. 
                   - To ensure there are absolutely ZERO floating or disconnected polygons, shapes must overlap or intersect cleanly (e.g., table legs must penetrate into the tabletop mesh, limbs must sink directly into body nodes).
                   - Break items into rich, multi-layered mesh sets to form intricate, highly detailed layouts.

                Available shapes: "box", "sphere", "cylinder", "cone", "capsule", "torus", "lathe", "extrude".
                HIGH POLYGON BUDGET: For curved profiles, specify a "segments" parameter between 64 and 128 to render smooth, dense geometric structures.

                Return a clean JSON object following this exact template:
                {
                  "description": "[Provide your comprehensive, exhaustive spatial and lighting data breakdown here...]",
                  "shapes": [
                    {
                      "name": "mesh_component_identifier",
                      "type": "box | sphere | cylinder | cone | capsule | torus | lathe | extrude",
                      "color": "#hexcode",
                      "position": {"x": 0.0, "y": 1.5, "z": -3.0},
                      "scale": {"x": 1.0, "y": 1.0, "z": 1.0},
                      "rotation": {"x": 0.0, "y": 0.0, "z": 0.0},
                      "segments": 96,
                      "pathPoints": [{"x": 0.0, "y": 0.0}, {"x": 0.4, "y": 0.3}, {"x": 0.1, "y": 0.9}],
                      "extrudeDepth": 0.35
                    }
                  ]
                }
                Ground floor plane is fixed at y=-3. Generate an extensive array of solid, interlocking, high-poly geometries!
            `;

            const priorityModels = ['gemini-3.5-flash', 'gemini-3.1-flash-lite', 'gemini-2.5-flash'];
            let finalErrorMessage = "Network connection failed.";

            for (let currentModel of priorityModels) {
                let attemptsLeft = 3;
                let backoffDelay = 1500;

                while (attemptsLeft > 0) {
                    try {
                        descDiv.style.color = "#ffab00";
                        descDiv.innerText = `Scanning with ${currentModel}...\n(Attempt ${4 - attemptsLeft} of 3)`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: promptText },
                                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                                    ]
                                }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (!response.ok) {
                            const errorJson = await response.json();
                            const serverMessage = errorJson.error?.message || "";
                            if (response.status === 429 || response.status === 503) {
                                await new Promise(res => setTimeout(res, backoffDelay));
                                attemptsLeft--; backoffDelay *= 2; continue;
                            }
                            throw new Error(`HTTP ${response.status} - ${serverMessage}`);
                        }

                        const data = await response.json();
                        let jsonText = data.candidates[0].content.parts[0].text;

                        const firstBracket = jsonText.indexOf('{');
                        const lastBracket = jsonText.lastIndexOf('}');
                        if (firstBracket !== -1 && lastBracket !== -1) {
                            jsonText = jsonText.substring(firstBracket, lastBracket + 1);
                        } else {
                            throw new Error("Invalid structure returned from endpoint.");
                        }

                        const parsedScene = JSON.parse(jsonText);
                        descDiv.style.color = "#fff";
                        descDiv.innerText = parsedScene.description;
                        
                        renderAIBlueprint(parsedScene.shapes);
                        
                        statusDiv.style.display = 'none';
                        return; 

                    } catch (err) {
                        finalErrorMessage = err.message;
                        attemptsLeft--;
                        if (attemptsLeft > 0) {
                            await new Promise(res => setTimeout(res, backoffDelay));
                            backoffDelay *= 2;
                        }
                    }
                }
            }

            descDiv.style.color = "#ff3333";
            descDiv.innerText = `Scan Error:\n${finalErrorMessage}`;
            statusDiv.style.display = 'none';
        }

        // --- HIGH-POLY HULL GENERATION FACTORY ---
        function renderAIBlueprint(shapesArray) {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            shapesArray.forEach(shapeData => {
                let geo;
                
                // CRANK GEOMETRIC BUDGETS: Enforce high-density subdivision limits
                const polyBudget = Math.max(shapeData.segments || 64, 64); 

                switch(shapeData.type.toLowerCase().trim()) {
                    case 'box': 
                        geo = new THREE.BoxGeometry(1, 1, 1, 8, 8, 8); 
                        break;
                    case 'sphere': 
                        geo = new THREE.SphereGeometry(0.5, polyBudget, polyBudget); 
                        break;
                    case 'cylinder': 
                        geo = new THREE.CylinderGeometry(0.5, 0.5, 1, polyBudget, 4); 
                        break;
                    case 'cone': 
                        geo = new THREE.ConeGeometry(0.5, 1, polyBudget, 4); 
                        break;
                    case 'capsule':
                        geo = new THREE.CapsuleGeometry(0.35, 0.7, 12, polyBudget);
                        break;
                    case 'torus':
                        geo = new THREE.TorusGeometry(0.4, 0.12, polyBudget, polyBudget * 1.5);
                        break;
                    case 'lathe':
                        if (shapeData.pathPoints && shapeData.pathPoints.length > 0) {
                            const lathePoints = shapeData.pathPoints.map(p => new THREE.Vector2(p.x, p.y));
                            geo = new THREE.LatheGeometry(lathePoints, polyBudget);
                        } else {
                            geo = new THREE.CylinderGeometry(0.5, 0.5, 1, polyBudget);
                        }
                        break;
                    case 'extrude':
                        if (shapeData.pathPoints && shapeData.pathPoints.length > 0) {
                            const shapePath = new THREE.Shape();
                            shapePath.moveTo(shapeData.pathPoints[0].x, shapeData.pathPoints[0].y);
                            for (let i = 1; i < shapeData.pathPoints.length; i++) {
                                shapePath.lineTo(shapeData.pathPoints[i].x, shapeData.pathPoints[i].y);
                            }
                            
                            const extrudeSettings = {
                                depth: shapeData.extrudeDepth || 0.4,
                                bevelEnabled: true,
                                bevelThickness: 0.03,
                                bevelSize: 0.015,
                                bevelSegments: 6,
                                curveSegments: Math.floor(polyBudget / 2)
                            };
                            geo = new THREE.ExtrudeGeometry(shapePath, extrudeSettings);
                            geo.center();
                        } else {
                            geo = new THREE.BoxGeometry(1, 1, 1);
                        }
                        break;
                    default: 
                        geo = new THREE.BoxGeometry(1, 1, 1);
                }

                // FORCE SURFACE INTEGRITY: Recompute vertex normals for organic, seamless hulls
                geo.computeVertexNormals();

                const mat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(shapeData.color || "#ffffff"),
                    flatShading: false, // Ensures perfectly smooth lighting gradients across dense meshes
                    roughness: 0.4,     
                    metalness: 0.1,
                    side: THREE.DoubleSide // Eliminates internal backface culling gaps if shapes twist inside out
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(shapeData.position.x, shapeData.position.y, shapeData.position.z);
                mesh.scale.set(shapeData.scale.x, shapeData.scale.y, shapeData.scale.z);
                mesh.rotation.set(shapeData.rotation.x, shapeData.rotation.y, shapeData.rotation.z);

                worldGroup.add(mesh);
            });
        }

        function clearSceneAndResetView() {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (gyroActive) {
                window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
                window.removeEventListener('devicemotion', handleHardwareInertialSensors);
                gyroActive = false;
                document.getElementById('gyroBtn').classList.remove('btn-active');
            }

            targetVelocity.set(0,0,0);
            currentVelocity.set(0,0,0);
            hardwareActivelySpinning = false;
            telemetryState.x = 0; telemetryState.y = 5; telemetryState.z = 15;
            
            initOrbitControls();
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);
            camera.rotation.set(0, 0, 0);
            camera.quaternion.set(0, 0, 0, 1);
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('debugPanel').innerText = "Cam: Ready | Sensors: Inactive";
            document.getElementById('aiDescription').innerText = "Scene reset. Ready to scan.";
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                clearSceneAndResetView();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(orientState => {
                            if (orientState === 'granted') {
                                DeviceMotionEvent.requestPermission().then(motionState => {
                                    if(motionState === 'granted') activateTrackingSensors(btn);
                                });
                            }
                        }).catch(err => console.error(err));
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btnElement) {
            if (controls) { controls.dispose(); controls = null; }
            targetVelocity.set(0,0,0); currentVelocity.set(0,0,0);
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleHardwareInertialSensors, true);
            gyroActive = true;
            btnElement.classList.add('btn-active');
        }

        function handleGyroscopeMotionInput(event) {
            if (!gyroActive) return;
            const alpha = (event.alpha !== null && !isNaN(event.alpha)) ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = (event.beta !== null && !isNaN(event.beta)) ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = (event.gamma !== null && !isNaN(event.gamma)) ? THREE.MathUtils.degToRad(event.gamma) : 0;
            const screenAngle = (window.screen && window.screen.orientation && !isNaN(window.screen.orientation.angle)) ? window.screen.orientation.angle : (window.orientation || 0);
            setObjectQuaternion(camera.quaternion, alpha, beta, gamma, THREE.MathUtils.degToRad(screenAngle));
        }

        function handleHardwareInertialSensors(event) {
            if (!gyroActive) return;
            const r = event.rotationRate; const accel = event.acceleration;
            if (!r || !accel || accel.x === null || accel.z === null) return;

            if (Math.abs(r.alpha || 0) > SPIN_KILL_LIMIT || Math.abs(r.beta || 0) > SPIN_KILL_LIMIT || Math.abs(r.gamma || 0) > SPIN_KILL_LIMIT) {
                hardwareActivelySpinning = true; targetVelocity.set(0, 0, 0); return;
            }
            hardwareActivelySpinning = false;

            let ax = accel.x; let az = accel.z;
            if (Math.abs(ax) < ACCEL_DEADZONE) ax = 0;
            if (Math.abs(az) < ACCEL_DEADZONE) az = 0;

            if (ax !== 0 || az !== 0) {
                let localForceVector = new THREE.Vector3(ax, 0, -az);
                localForceVector.applyQuaternion(camera.quaternion);
                localForceVector.y = 0; localForceVector.normalize();
                targetVelocity.copy(localForceVector).setLength(Math.sqrt(ax * ax + az * az) * ACCEL_GAIN);
            } else {
                targetVelocity.multiplyScalar(SLIDE_FRICTION);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) {
                controls.update(); 
            } else {
                currentVelocity.lerp(targetVelocity, 0.25);
                if (currentVelocity.length() > MAX_SPEED_CEILING) currentVelocity.setLength(MAX_SPEED_CEILING);
                if (currentVelocity.lengthSq() > 0.00001) camera.position.add(currentVelocity);
                else currentVelocity.set(0, 0, 0);
                telemetryState.x = camera.position.x; telemetryState.z = camera.position.z;
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;
    </script>
</body>
</html>
