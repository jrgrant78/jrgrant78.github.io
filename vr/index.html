<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor - SDF Engine</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }
        
        /* Main Controls Container pinned symmetrically with matching left/right margins */
        #controls { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15,15,22,0.9); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
            box-sizing: border-box;
        }
        
        /* Flex assembly distributes extra space between control stack and camera feed */
        .upper-deck {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: stretch;
            width: 100%;
        }

        /* Fixed width column preserves precise button scaling configurations */
        .control-core {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 170px;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 0;
        }

        .header-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            width: 100%;
        }

        /* Integrated Vector Control Toggle Button */
        #uiToggleBtn { 
            width: 32px; 
            height: 32px; 
            background: #1a1a24; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #uiToggleBtn:active { transform: scale(0.95); }
        #uiToggleBtn svg { display: block; }
        
        /* Right-aligned camera screen with fixed 4:3 dimensions matching the deck height */
        #cameraWindow { 
            width: 120px;
            height: 90px;
            flex-shrink: 0;
            border: 2px solid #00e5ff; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box;
        }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .btn-toolbar { display: flex; gap: 8px; width: 100%; margin: 0; }
        
        button.action-btn { 
            flex: 1; 
            aspect-ratio: 1;
            background: #1a1a24; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button.action-btn svg { display: block; }
        
        /* Color Mapping Properties */
        button.btn-scan { color: #00e676; border-color: #00e676; } 
        button.btn-gyro { color: #ffea00; border-color: #ffea00; } 
        button.btn-clear { color: #ff1744; border-color: #ff1744; } 
        
        .btn-active { background: #ffea00 !important; color: #0b0b0f !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        
        .key-input {
            width: 100%;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 150px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.4; }
        
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { width: 100vw; height: 100vh; display: block; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="controls">
        <div class="upper-deck">
            <div class="control-core">
                <div class="header-row">
                    <button id="uiToggleBtn" title="Toggle UI Controls">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                    <h4 style="margin: 0; color: #00e5ff; font-size: 0.85em; letter-spacing: 0.3px; flex-grow: 1; text-align: left;">Spatial Sculptor</h4>
                </div>
                
                <div class="btn-toolbar" id="toolbarNode">
                    <button id="scanBtn" class="action-btn btn-scan" title="Scan Surroundings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                            <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                            <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                            <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                        </svg>
                    </button>
                    <button id="gyroBtn" class="action-btn btn-gyro" title="Enable Gyro & Inertial Walk">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </button>
                    <button id="clearBtn" class="action-btn btn-clear" title="Clear Scene & Reset View">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="cameraWindow">
                <video id="cameraFeed" autoplay playsinline muted></video>
            </div>
        </div>
        
        <div id="lowerContent">
            <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
            
            <div id="status">Analyzing live frame parameters...</div>
            <div id="aiDescription">Ready to scan scene!<br>Aim camera and tap capture button to scan.</div>
        </div>
    </div>

    <div id="debugPanel">
        Cam: Initializing... | Sensors: Inactive
    </div>

    <canvas id="canvas3d"></canvas>

    <!-- GPU RAYMARCHING ENGINE KERNEL SHADERS -->
    <script>
        const vertexShaderSource = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShaderSource = `
            uniform vec2 u_resolution;
            uniform vec3 u_cameraPosition;
            uniform vec3 u_camForward;
            uniform vec3 u_camRight;
            uniform vec3 u_camUp;
            
            // Structured uniform primitives data limits optimized for mobile processing fills
            uniform int u_shapeCount;
            uniform int u_shapeTypes[45];     // 0 = Sphere, 1 = Box
            uniform vec3 u_shapePositions[45];
            uniform vec3 u_shapeSizes[45];
            uniform vec3 u_shapeColors[45];

            varying vec2 vUv;

            // Mathematical Signed Distance Field Functions
            float sdSphere(vec3 p, float r) {
                return length(p) - r;
            }

            float sdBox(vec3 p, vec3 b) {
                vec3 q = abs(p) - b;
                return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
            }

            // Exponential Smooth Minimum function for organic geometry melting calculations
            float smin(float a, float b, float k, inout float mixOut) {
                float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                mixOut = h;
                return mix(b, a, h) - k * h * (1.0 - h);
            }

            // Resolves field metrics across all primitives arrays
            vec4 distanceFieldMap(vec3 p) {
                float globalDist = 1e5;
                vec3 mixedColor = vec3(0.0);
                
                if (u_shapeCount == 0) {
                    // Generates base tracking grid marker if array is empty
                    float floorGrid = p.y - (-3.0);
                    return vec4(vec3(0.12, 0.15, 0.2), floorGrid);
                }

                for (int i = 0; i < 45; i++) {
                    if (i >= u_shapeCount) break;

                    vec3 localPos = p - u_shapePositions[i];
                    float currentShapeDist = 0.0;

                    if (u_shapeTypes[i] == 0) {
                        currentShapeDist = sdSphere(localPos, u_shapeSizes[i].x);
                    } else {
                        currentShapeDist = sdBox(localPos, u_shapeSizes[i]);
                    }

                    if (i == 0) {
                        globalDist = currentShapeDist;
                        mixedColor = u_shapeColors[i];
                    } else {
                        float h = 0.0;
                        // Blending matrix setting (k = 0.45 determines melting range radius)
                        globalDist = smin(globalDist, currentShapeDist, 0.45, h);
                        mixedColor = mix(u_shapeColors[i], mixedColor, h);
                    }
                }

                return vec4(mixedColor, globalDist);
            }

            // Analytical normal estimation matrix calculation
            vec3 calculateNormal(vec3 p) {
                const float eps = 0.002;
                const vec2 h = vec2(1.0, -1.0);
                return normalize(
                    h.xyy * distanceFieldMap(p + h.xyy * eps).w +
                    h.yyx * distanceFieldMap(p + h.yyx * eps).w +
                    h.yxy * distanceFieldMap(p + h.yxy * eps).w +
                    h.xxx * distanceFieldMap(p + h.xxx * eps).w
                );
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                
                // Formulate projection vectors from active camera orientation matrices
                vec3 rayDir = normalize(u_camForward + uv.x * u_camRight + uv.y * u_camUp);
                vec3 rayOrigin = u_cameraPosition;

                float t = 0.0;
                float maxDist = 40.0;
                vec4 fieldData;
                bool hit = false;

                // Raymarching primary execution sequence
                for (int steps = 0; steps < 80; steps++) {
                    vec3 p = rayOrigin + rayDir * t;
                    fieldData = distanceFieldMap(p);
                    float d = fieldData.w;
                    
                    if (d < 0.002) {
                        hit = true;
                        break;
                    }
                    t += d;
                    if (t > maxDist) break;
                }

                vec3 finalPixelColor = vec3(0.04, 0.04, 0.06); // Default environment canvas gradient background

                if (hit) {
                    vec3 hitPoint = rayOrigin + rayDir * t;
                    vec3 surfaceNormal = calculateNormal(hitPoint);
                    vec3 baseAlbedo = fieldData.xyz;

                    // Multi-source localized analytical ambient specular phong pass configurations
                    vec3 lightPos1 = vec3(20.0, 40.0, 25.0);
                    vec3 lightDir1 = normalize(lightPos1 - hitPoint);
                    float diffuse1 = max(dot(surfaceNormal, lightDir1), 0.0);

                    vec3 lightDir2 = normalize(vec3(-20.0, 20.0, -20.0)); // Fill rim source setup
                    float diffuse2 = max(dot(surfaceNormal, lightDir2), 0.0) * 0.4;

                    // High gloss clearcoat simulation layer calculation
                    vec3 viewDir = normalize(rayOrigin - hitPoint);
                    vec3 halfDir = normalize(lightDir1 + viewDir);
                    float specular = pow(max(dot(surfaceNormal, halfDir), 0.0), 32.0) * 0.75;

                    vec3 lightingResult = baseAlbedo * (diffuse1 + diffuse2 + 0.25) + vec3(specular);
                    
                    // Depth mist fade system
                    finalPixelColor = mix(lightingResult, finalPixelColor, clamp(t / maxDist, 0.0, 1.0));
                }

                gl_FragColor = vec4(finalPixelColor, 1.0);
            }
        `;
    </script>

    <script>
        const ACCEL_GAIN       = 0.35; 
        const ACCEL_DEADZONE   = 0.35; 
        const SPIN_KILL_LIMIT  = 4.5;  
        const SLIDE_FRICTION   = 0.80; 
        const MAX_SPEED_CEILING = 0.60; 

        let scenePerspective, cameraPerspective, renderer, controls;
        let sceneOrtho, cameraOrtho, sdfMaterial, sdfQuad;
        let videoElement, localStream;
        let gyroActive = false;

        let targetVelocity = new THREE.Vector3();
        let currentVelocity = new THREE.Vector3();
        let hardwareActivelySpinning = false;
        let scanInProgress = false;

        let telemetryState = {
            alpha: 0, beta: 0, gamma: 0,
            x: 0, y: 3, z: 12
        };

        // Extracted dynamic structural arrays mapping uniforms directly into rendering context memory slots
        let uniformArrays = {
            count: 0,
            types: new Int32Array(45),
            positions: new Float32Array(45 * 3),
            sizes: new Float32Array(45 * 3),
            colors: new Float32Array(45 * 3)
        };

        const OPEN_EYE_SVG = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        `;

        const CLOSED_EYE_SVG = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M3 10c4 4 14 4 18 0"/>
                <path d="M6 11.5l-1 2"/>
                <path d="M9 12.5v2.5"/>
                <path d="M12 13v3"/>
                <path d="M15 12.5v2.5"/>
                <path d="M18 11.5l1 2"/>
            </svg>
        `;

        const setObjectQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( quaternion, alpha, beta, gamma, orient ) {
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                quaternion.setFromEuler( euler ); 
                quaternion.multiply( q1 ); 
                quaternion.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
            };
        })();

        function init3D() {
            const canvas = document.getElementById('canvas3d');

            // Virtual tracking perspective container assembly
            cameraPerspective = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            cameraPerspective.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            initOrbitControls();

            // Screen space Orthographic projection scene configuration mapping the fragment system
            sceneOrtho = new THREE.Scene();
            cameraOrtho = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            sdfMaterial = new THREE.ShaderMaterial({
                vertexShader: vertexShaderSource,
                fragmentShader: fragmentShaderSource,
                uniforms: {
                    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    u_cameraPosition: { value: new THREE.Vector3() },
                    u_camForward: { value: new THREE.Vector3() },
                    u_camRight: { value: new THREE.Vector3() },
                    u_camUp: { value: new THREE.Vector3() },
                    u_shapeCount: { value: 0 },
                    u_shapeTypes: { value: uniformArrays.types },
                    u_shapePositions: { value: uniformArrays.positions },
                    u_shapeSizes: { value: uniformArrays.sizes },
                    u_shapeColors: { value: uniformArrays.colors }
                },
                depthWrite: false,
                depthTest: false
            });

            sdfQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), sdfMaterial);
            sceneOrtho.add(sdfQuad);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);
            document.getElementById('uiToggleBtn').addEventListener('click', toggleControlPanelsVisibility);

            initRearCameraStreamGracefully();

            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('apiKeyField').value = urlKey.trim();
                document.getElementById('aiDescription').innerHTML = "Ready to scan scene!<br>Gemini API Key loaded automatically from URL.";
            }

            animate();
        }

        function toggleControlPanelsVisibility() {
            const toolbar = document.getElementById('toolbarNode');
            const cameraWin = document.getElementById('cameraWindow');
            const lowerContent = document.getElementById('lowerContent');
            const debugPanel = document.getElementById('debugPanel');
            const toggleBtn = document.getElementById('uiToggleBtn');

            if (toolbar.style.display === 'none') {
                toolbar.style.display = 'flex';
                cameraWin.style.display = 'block';
                lowerContent.style.display = 'block';
                debugPanel.style.display = 'block';
                toggleBtn.innerHTML = OPEN_EYE_SVG;
                toggleBtn.style.color = '#ffffff';
                toggleBtn.style.borderColor = '#444';
            } else {
                toolbar.style.display = 'none';
                cameraWin.style.display = 'none';
                lowerContent.style.display = 'none';
                debugPanel.style.display = 'none';
                toggleBtn.innerHTML = CLOSED_EYE_SVG;
                toggleBtn.style.color = '#ffffff';
                toggleBtn.style.borderColor = '#444';
            }
        }

        function initOrbitControls() {
            controls = new THREE.OrbitControls(cameraPerspective, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
        }

        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            const debugLog = document.getElementById('debugPanel');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                debugLog.innerText = "Cam: Secure Context Required.";
                return;
            }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                videoElement.srcObject = localStream;
            } catch (err) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                } catch (fallbackErr) {
                    debugLog.innerText = "Cam: Blocked";
                }
            }
        }

        async function captureAndScanFrame() {
            if (scanInProgress) return;
            
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const scanBtn = document.getElementById('scanBtn');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();

            if (!userEnteredKey) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = "Authentication Error:\nPlease enter a valid Gemini API Key.";
                return;
            }

            if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                alert("Camera feed stream is initializing.");
                return;
            }

            scanInProgress = true;
            scanBtn.disabled = true;
            scanBtn.style.opacity = "0.4";
            statusDiv.style.display = 'block';

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = videoElement.videoWidth;
            hiddenCanvas.height = videoElement.videoHeight;
            const ctx = hiddenCanvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            const base64Image = hiddenCanvas.toDataURL('image/jpeg').split(',')[1];

            const priorityModels = ['gemini-2.5-flash', 'gemini-3.5-flash', 'gemini-3.1-flash-lite'];
            let forensicTextBlueprint = "";
            let finalShapesPayload = null;
            let finalErrorMessage = "Network pipeline error.";

            // PASS 1: LINGUISTIC FORENSIC COMPOSITION
            const pass1Prompt = `
                You are a micro-spatial computer vision engine. Analyze this camera frame with absolute architectural literalism.
                Write an exhaustive, granular spatial text log detailing every visible element down to the last detail.
                Document the exact identity, relative positions, depth layers, coordinate intersections, color tones, textures, and angles of real-world light sources striking the scene.
                Return ONLY a clean JSON object containing a single string key:
                { "desc": "[Your exhaustive forensic text analysis here...]" }
            `;

            for (let currentModel of priorityModels) {
                if (forensicTextBlueprint) break;
                try {
                    descDiv.style.color = "#ffab00";
                    descDiv.innerText = `Pass 1/2: Analyzing visual details...\n(${currentModel})`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass1Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                        forensicTextBlueprint = parsed.desc;
                    }
                } catch (err) {
                    finalErrorMessage = `Pass 1 Failed: ${err.message}`;
                }
            }

            if (!forensicTextBlueprint) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = `Scan Error at Pass 1:\n${finalErrorMessage}`;
                scanInProgress = false; scanBtn.disabled = false; scanBtn.style.opacity = "1"; statusDiv.style.display = 'none';
                return;
            }

            // PASS 2: STRUCTURAL ARRAY COMPILATION (OPTIMIZED SHADER BINDING PARAMS)
            const pass2Prompt = `
                You are a master chiseled sculptor and 3D CAD engine array compiler.
                Using the provided camera frame AND the forensic blueprint, construct a complex solid assembly containing between 40 and 45 distinct primitives.
                Every primitive object must slice directly into its neighboring shapes by at least 15% to guarantee fluid smin melting coalescence! Loose or separate floating components are strictly prohibited.

                Format using this exact compressed token schema layout:
                "t": type ("sphere" | "box")
                "c": hex color string
                "p": position array [x, y, z]
                "s": scale array [x, y, z]

                Return ONLY a clean JSON object matching this structural layout:
                {
                  "shapes": [
                    { "t": "sphere", "c": "#ffffff", "p": [0.0, 1.2, -3.0], "s": [0.4, 0.4, 0.4] }
                  ]
                }
                Ground floor boundary is y=-3. Generate all 40-45 interlocking primitives to allow perfect organic blending.
            `;

            for (let currentModel of priorityModels) {
                if (finalShapesPayload) break;
                try {
                    descDiv.style.color = "#ffab00";
                    descDiv.innerText = `Pass 2/2: Compiling blend structures...\n(${currentModel})`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass2Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        let jsonText = data.candidates[0].content.parts[0].text;
                        const firstBracket = jsonText.indexOf('{');
                        const lastBracket = jsonText.lastIndexOf('}');
                        jsonText = jsonText.substring(firstBracket, lastBracket + 1);
                        
                        const parsed = JSON.parse(jsonText);
                        if (parsed && Array.isArray(parsed.shapes)) {
                            finalShapesPayload = parsed.shapes;
                        }
                    }
                } catch (err) {
                    finalErrorMessage = `Pass 2 Failed: ${err.message}`;
                }
            }

            if (finalShapesPayload) {
                descDiv.style.color = "#fff";
                descDiv.innerText = forensicTextBlueprint; 
                parseShapesIntoUniformArrays(finalShapesPayload);
            } else {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = `Scan Error at Pass 2:\n${finalErrorMessage}`;
            }

            scanInProgress = false;
            scanBtn.disabled = false;
            scanBtn.style.opacity = "1";
            statusDiv.style.display = 'none';
        }

        // --- PIPES EXTRACTED bluePRINT STRUCTS DIRECTLY INTO SHADER MEMORY MATRICES ---
        function parseShapesIntoUniformArrays(shapesArray) {
            let count = Math.min(shapesArray.length, 45);
            uniformArrays.count = count;

            for (let i = 0; i < count; i++) {
                let item = shapesArray[i];
                
                // Map out primitive codes
                uniformArrays.types[i] = (item.t && item.t.toLowerCase() === 'box') ? 1 : 0;
                
                let p = item.p || [0,0,0];
                uniformArrays.positions[i * 3 + 0] = p[0] ?? 0;
                uniformArrays.positions[i * 3 + 1] = p[1] ?? 0;
                uniformArrays.positions[i * 3 + 2] = p[2] ?? 0;

                let s = item.s || [0.5, 0.5, 0.5];
                uniformArrays.sizes[i * 3 + 0] = s[0] ?? 0.5;
                uniformArrays.sizes[i * 3 + 1] = s[1] ?? 0.5;
                uniformArrays.sizes[i * 3 + 2] = s[2] ?? 0.5;

                let color = new THREE.Color(item.c || "#ffffff");
                uniformArrays.colors[i * 3 + 0] = color.r;
                uniformArrays.colors[i * 3 + 1] = color.g;
                uniformArrays.colors[i * 3 + 2] = color.b;
            }

            // Sync uniforms into existing material instance allocations
            sdfMaterial.uniforms.u_shapeCount.value = uniformArrays.count;
            sdfMaterial.uniforms.u_shapeTypes.value = uniformArrays.types;
            sdfMaterial.uniforms.u_shapePositions.value = uniformArrays.positions;
            sdfMaterial.uniforms.u_shapeSizes.value = uniformArrays.sizes;
            sdfMaterial.uniforms.u_shapeColors.value = uniformArrays.colors;
            sdfMaterial.needsUpdate = true;
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                deactivateTrackingSensors();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(orientState => {
                            if (orientState === 'granted') {
                                DeviceMotionEvent.requestPermission().then(motionState => {
                                    if(motionState === 'granted') activateTrackingSensors(btn);
                                });
                            }
                        }).catch(err => console.error(err));
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btnElement) {
            if (controls) { controls.dispose(); controls = null; }
            targetVelocity.set(0,0,0); currentVelocity.set(0,0,0);
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleHardwareInertialSensors, true);
            gyroActive = true;
            btnElement.classList.add('btn-active');
            document.getElementById('debugPanel').innerText = "Sensors: Active | Organic SDF Raymarching Navigation Enabled";
        }

        function deactivateTrackingSensors() {
            if (!gyroActive) return;
            window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
            window.removeEventListener('devicemotion', handleHardwareInertialSensors);
            gyroActive = false;
            document.getElementById('gyroBtn').classList.remove('btn-active');
            
            targetVelocity.set(0,0,0);
            currentVelocity.set(0,0,0);
            hardwareActivelySpinning = false;
            
            initOrbitControls();
            document.getElementById('debugPanel').innerText = "Cam: Ready | Sensors: Inactive";
        }

        function clearSceneAndResetView() {
            uniformArrays.count = 0;
            sdfMaterial.uniforms.u_shapeCount.value = 0;
            sdfMaterial.needsUpdate = true;

            deactivateTrackingSensors();

            telemetryState.x = 0; telemetryState.y = 3; telemetryState.z = 12;
            cameraPerspective.position.set(telemetryState.x, telemetryState.y, telemetryState.z);
            cameraPerspective.rotation.set(0, 0, 0);
            cameraPerspective.quaternion.set(0, 0, 0, 1);
            
            if (!controls) initOrbitControls();
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('aiDescription').innerText = "SDF matrix cleared. Ready for next projection run.";
        }

        function handleGyroscopeMotionInput(event) {
            if (!gyroActive) return;
            const alpha = (event.alpha !== null && !isNaN(event.alpha)) ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = (event.beta !== null && !isNaN(event.beta)) ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = (event.gamma !== null && !isNaN(event.gamma)) ? THREE.MathUtils.degToRad(event.gamma) : 0;
            const screenAngle = (window.screen && window.screen.orientation && !isNaN(window.screen.orientation.angle)) ? window.screen.orientation.angle : (window.orientation || 0);
            setObjectQuaternion(cameraPerspective.quaternion, alpha, beta, gamma, THREE.MathUtils.degToRad(screenAngle));
        }

        function handleHardwareInertialSensors(event) {
            if (!gyroActive) return;
            const r = event.rotationRate; const accel = event.acceleration;
            if (!r || !accel || accel.x === null || accel.z === null) return;

            if (Math.abs(r.alpha || 0) > SPIN_KILL_LIMIT || Math.abs(r.beta || 0) > SPIN_KILL_LIMIT || Math.abs(r.gamma || 0) > SPIN_KILL_LIMIT) {
                hardwareActivelySpinning = true; 
                targetVelocity.set(0, 0, 0); 
                return;
            }
            hardwareActivelySpinning = false;

            let ax = accel.x; 
            let az = accel.z; 

            if (Math.abs(ax) < ACCEL_DEADZONE) ax = 0;
            if (Math.abs(az) < ACCEL_DEADZONE) az = 0;

            if (ax !== 0 || az !== 0) {
                let forward = new THREE.Vector3();
                cameraPerspective.getWorldDirection(forward);
                forward.y = 0; 
                
                if (forward.lengthSq() < 0.01) {
                    forward.set(0, 0, -1).applyQuaternion(cameraPerspective.quaternion);
                    forward.y = 0;
                }
                forward.normalize();

                let right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                let horizontalMove = new THREE.Vector3();
                horizontalMove.addScaledVector(right, ax);
                horizontalMove.addScaledVector(forward, -az); 
                horizontalMove.normalize();

                targetVelocity.copy(horizontalMove).setLength(Math.sqrt(ax * ax + az * az) * ACCEL_GAIN);
            } else {
                targetVelocity.multiplyScalar(SLIDE_FRICTION);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) {
                controls.update(); 
            } else {
                currentVelocity.lerp(targetVelocity, 0.25);
                if (currentVelocity.length() > MAX_SPEED_CEILING) currentVelocity.setLength(MAX_SPEED_CEILING);
                
                if (currentVelocity.lengthSq() > 0.00001) cameraPerspective.position.add(currentVelocity);
                else currentVelocity.set(0, 0, 0);
            }

            // --- RESOLVES AND PACKS ACTIVE CAMERA COORDINATES TO SDF FRAGMENT UNIFORMS ---
            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(cameraPerspective.quaternion).normalize();
            const rightVector = new THREE.Vector3(1, 0, 0).applyQuaternion(cameraPerspective.quaternion).normalize();
            const upVector = new THREE.Vector3(0, 1, 0).applyQuaternion(cameraPerspective.quaternion).normalize();
            
            const fovRadiantScale = Math.tan(THREE.MathUtils.degToRad(cameraPerspective.fov * 0.5));
            const viewAspectRatio = window.innerWidth / window.innerHeight;

            sdfMaterial.uniforms.u_cameraPosition.value.copy(cameraPerspective.position);
            sdfMaterial.uniforms.u_camForward.value.copy(forwardVector);
            sdfMaterial.uniforms.u_camRight.value.copy(rightVector).multiplyScalar(fovRadiantScale * viewAspectRatio);
            sdfMaterial.uniforms.u_camUp.value.copy(upVector).multiplyScalar(fovRadiantScale);

            // Execute full-screen shader pass
            renderer.render(sceneOrtho, cameraOrtho);
        }

        function onWindowResize() {
            cameraPerspective.aspect = window.innerWidth / window.innerHeight;
            cameraPerspective.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            sdfMaterial.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;
    </script>
</body>
</html>
