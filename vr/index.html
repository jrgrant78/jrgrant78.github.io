<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }
        
        /* Mobile UI Overlay Controls Container */
        #controls { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(15,15,22,0.9); padding: 15px; border-radius: 8px; border: 1px solid #333; width: 200px; box-shadow: 0 4px 25px rgba(0,0,0,0.8); }
        
        /* Small Upper-Right Camera View Window */
        #cameraWindow { position: absolute; top: 10px; right: 10px; z-index: 10; width: 120px; height: 90px; border: 2px solid #00e5ff; border-radius: 6px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; }
        
        /* Consistent Icon Toolbar Grid Layout */
        .btn-toolbar { display: flex; gap: 8px; margin-top: 10px; width: 100%; }
        
        /* Highly Consistent Icon Sizing Sheet */
        button { 
            flex: 1; 
            aspect-ratio: 1; /* Guarantees matching square shapes */
            background: #1a1a24; 
            color: #fff; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.4em; /* Uniform visibility scales */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        /* Color Coordination Borders */
        .btn-scan { color: #00e5ff; border-color: #00e5ff; }
        .btn-gyro { color: #ff007f; border-color: #ff007f; }
        .btn-clear { color: #ffab00; border-color: #ffab00; }
        
        /* Uniform Active States */
        .btn-active { background: #ff007f !important; color: #fff !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        
        /* Consistent Input Field Style Sheet */
        .key-input {
            width: 100%;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 100px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; }
        
        /* Hardware Live Debugger Panel */
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { width: 100vw; height: 100vh; display: block; }
    </style>

    <!-- Production 3D Framework Pipeline CDN Links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- Upper Right Video Feed Window Component -->
    <div id="cameraWindow">
        <video id="cameraFeed" autoplay playsinline muted></video>
    </div>

    <!-- UI Overlay Layout Controls -->
    <div id="controls">
        <h4 style="margin: 0 0 5px 0; color: #00e5ff; text-align: center;">Spatial Sculptor</h4>
        
        <!-- Consistent Icon Row Interface Setup -->
        <div class="btn-toolbar">
            <button id="scanBtn" class="btn-scan" title="Scan Surroundings">⛶</button>
            <button id="gyroBtn" class="btn-gyro" title="Enable Gyro & Inertial Walk">🕧</button>
            <button id="clearBtn" class="btn-clear" title="Clear Scene & Reset View">🗑</button>
        </div>

        <!-- Manual User Key Field Placement Layer -->
        <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
        
        <div id="status">Analyzing live frame parameters...</div>
        <div id="aiDescription">Ready to scan scene!<br>Aim camera and tap ⛶ to scan.</div>
    </div>

    <!-- On-Screen Debug Console Overlay for Mobile Diagnostics -->
    <div id="debugPanel">
        Cam: Initializing... | Sensors: Inactive
    </div>

    <canvas id="canvas3d"></canvas>

    <script>
        // =========================================================================
        // PURE HARDWARE INERTIAL TUNING BLOCK
        // =========================================================================
        const ACCEL_GAIN       = 0.35; // Amplifies your physical pushes into virtual space
        const ACCEL_DEADZONE   = 0.30; // Filters out micro hand tremors and desk vibrations
        const SPIN_KILL_LIMIT  = 14.0; // Rotation velocity ceiling (degrees/sec). Lower = stricter isolation.
        const SLIDE_FRICTION   = 0.85; // Inertial coasting brake force. Lower = stops faster.
        const MAX_SPEED_CEILING = 0.60; // Absolute safety governor preventing runaway speeds
        // =========================================================================

        let scene, camera, renderer, controls;
        let videoElement, localStream;
        let gyroActive = false;
        const worldGroup = new THREE.Group();

        // Physics Engine Vectors
        let targetVelocity = new THREE.Vector3();
        let currentVelocity = new THREE.Vector3();
        let hardwareActivelySpinning = false;

        // Unified UI Diagnostic State Container
        let telemetryState = {
            alpha: 0, beta: 0, gamma: 0,
            x: 0, y: 5, z: 15
        };

        // 1. Device Orientation Quaternion Mathematics Helper
        const setObjectQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( quaternion, alpha, beta, gamma, orient ) {
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                quaternion.setFromEuler( euler ); 
                quaternion.multiply( q1 ); 
                quaternion.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
            };
        })();

        // 2. Initial Framework Sandbox Initialization
        function init3D() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            initOrbitControls();

            // Environmental Grid Matrix
            const grid = new THREE.GridHelper(50, 25, 0x00e5ff, 0x1f1f2e);
            grid.position.y = -3;
            scene.add(grid);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.9);
            light.position.set(10, 30, 15);
            scene.add(light);

            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);

            initRearCameraStreamGracefully();
            animate();
        }

        function initOrbitControls() {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
        }

        // 3. Hardware Access Pipeline
        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            const descDiv = document.getElementById('aiDescription');
            const debugLog = document.getElementById('debugPanel');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                debugLog.innerText = "Cam: Secure Context (HTTPS) Required.";
                descDiv.style.color = "#ff3333";
                descDiv.innerText = "Security Halt:\nCamera routing requires a secure context (HTTPS/localhost).";
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                videoElement.srcObject = localStream;
                debugLog.innerText = "Cam: Environmental Lens Active | Sensors: Inactive";
            } catch (err) {
                console.warn("Targeted rear camera failed. Fallback active...", err);
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                    debugLog.innerText = "Cam: Default/Webcam Fallback Active | Sensors: Inactive";
                } catch (fallbackErr) {
                    console.error("All camera pathways blocked:", fallbackErr);
                    debugLog.innerText = "Cam: Access Denied";
                    descDiv.style.color = "#ff3333";
                    descDiv.innerText = "Hardware Blocked:\nCamera access denied.";
                }
            }
        }

        // 4. Canvas Snapshot Capture + AI Generation
        async function captureAndScanFrame() {
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();
        
            if (!userEnteredKey || userEnteredKey === "") {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = "Authentication Halt:\nPlease enter an API key.\n\nAim camera and tap ⛶ to scan.";
                return;
            }
        
            if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                alert("Camera feed stream is not active yet.");
                return;
            }
        
            statusDiv.style.display = 'block';
        
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = videoElement.videoWidth;
            hiddenCanvas.height = videoElement.videoHeight;
            const ctx = hiddenCanvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            
            const base64Image = hiddenCanvas.toDataURL('image/jpeg').split(',')[1];
        
            const promptText = `
                You are a master parametric 3D modeler. Analyze this spatial snapshot camera frame.
                Your goal is to recreate the scene using highly detailed, high-polygon procedural structures. 
        
                Available shape types:
                - "box", "sphere", "cylinder", "cone", "capsule", "torus"
                - "lathe": For intricate rotational geometry (vases, cups, round ornate furniture pillars). Requires a "pathPoints" array of 2D coordinates representing the silhouette profile from bottom to top.
                - "extrude": For complex linear cross-sections (gears, stars, text shapes, unique custom moldings). Requires a "pathPoints" array forming a closed 2D shape.
        
                POLYGON RESOLUTION: For curved primitives, provide a "segments" parameter between 32 and 64 to guarantee perfectly smooth, dense, high-polygon surfaces.
        
                Return a single, structurally perfect JSON object exactly matching this schema:
                {
                  "description": "A meticulous, highly detailed analysis of the physical space, lighting, and asset placement...",
                  "shapes": [
                    {
                      "name": "detailed_mesh_id",
                      "type": "box | sphere | cylinder | cone | capsule | torus | lathe | extrude",
                      "color": "#hexcode",
                      "position": {"x": 0.0, "y": 1.5, "z": -3.0},
                      "scale": {"x": 1.0, "y": 1.0, "z": 1.0},
                      "rotation": {"x": 0.0, "y": 0.0, "z": 0.0},
                      "segments": 64,
                      "pathPoints": [{"x": 0.0, "y": 0.0}, {"x": 0.5, "y": 0.5}, {"x": 0.2, "y": 1.0}],
                      "extrudeDepth": 0.5
                    }
                  ]
                }
                Ground plane is y=-3. Generate a rich array of densely packed, high-poly components to accurately capture intricate design details!
            `;
        
            const priorityModels = ['gemini-3.5-flash', 'gemini-3.1-flash-lite', 'gemini-2.5-flash'];
            let pipelineSuccess = false;
            let finalErrorMessage = "Unknown network error.";
        
            for (let currentModel of priorityModels) {
                let attemptsLeft = 3;
                let backoffDelay = 1500;
        
                while (attemptsLeft > 0) {
                    try {
                        descDiv.style.color = "#ffab00";
                        descDiv.innerText = `Connecting via ${currentModel}...\n(Attempt ${4 - attemptsLeft} of 3)`;
        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${userEnteredKey}`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'x-goog-api-key': userEnteredKey 
                            },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: promptText },
                                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                                    ]
                                }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
        
                        if (!response.ok) {
                            const errorJson = await response.json();
                            const serverMessage = errorJson.error?.message || "";
                            if (response.status === 429 || response.status === 503 || serverMessage.toLowerCase().includes("high demand")) {
                                await new Promise(res => setTimeout(res, backoffDelay));
                                attemptsLeft--;
                                backoffDelay *= 2;
                                continue;
                            }
                            throw new Error(`HTTP ${response.status} - ${serverMessage}`);
                        }
        
                        const data = await response.json();
                        let jsonText = data.candidates[0].content.parts[0].text;
        
                        const firstBracket = jsonText.indexOf('{');
                        const lastBracket = jsonText.lastIndexOf('}');
                        if (firstBracket !== -1 && lastBracket !== -1) {
                            jsonText = jsonText.substring(firstBracket, lastBracket + 1);
                        } else {
                            throw new Error("Valid structural JSON block missing from payload.");
                        }
        
                        const parsedScene = JSON.parse(jsonText);
                        descDiv.style.color = "#aaa";
                        descDiv.innerText = parsedScene.description;
                        
                        renderAIBlueprint(parsedScene.shapes);
                        pipelineSuccess = true;
                        break;
        
                    } catch (err) {
                        finalErrorMessage = err.message;
                        attemptsLeft--;
                        await new Promise(res => setTimeout(res, backoffDelay));
                        backoffDelay *= 2;
                    }
                }
                if (pipelineSuccess) break;
            }
        
            if (!pipelineSuccess) {
                descDiv.style.color = "#ff3333";
                descDiv.innerText = `Scan Processing Failure:\n${finalErrorMessage}\n\nAim camera and tap ⛶ to scan.`;
            }
            statusDiv.style.display = 'none';
        }

        // 5. Mesh Processing Generator Engine
        function renderAIBlueprint(shapesArray) {
            // Safely clear out previous meshes
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }
        
            shapesArray.forEach(shapeData => {
                let geo;
                
                // Dynamically extract the requested polygon budget from the AI payload
                const polyBudget = shapeData.segments || 48;
        
                switch(shapeData.type.toLowerCase().trim()) {
                    case 'box': 
                        // Increased subdivision segments to handle complex lighting deformations smoothly
                        geo = new THREE.BoxGeometry(1, 1, 1, 4, 4, 4); 
                        break;
                    case 'sphere': 
                        geo = new THREE.SphereGeometry(0.5, polyBudget, polyBudget); 
                        break;
                    case 'cylinder': 
                        geo = new THREE.CylinderGeometry(0.5, 0.5, 1, polyBudget); 
                        break;
                    case 'cone': 
                        geo = new THREE.ConeGeometry(0.5, 1, polyBudget); 
                        break;
                    case 'capsule':
                        geo = new THREE.CapsuleGeometry(0.35, 0.7, 8, polyBudget);
                        break;
                    case 'torus':
                        geo = new THREE.TorusGeometry(0.4, 0.12, polyBudget, polyBudget * 2);
                        break;
                        
                    case 'lathe':
                        // Procedural generation: Converts custom 2D silhouettes into intricate high-poly 3D models
                        if (shapeData.pathPoints && shapeData.pathPoints.length > 0) {
                            const lathePoints = shapeData.pathPoints.map(p => new THREE.Vector2(p.x, p.y));
                            geo = new THREE.LatheGeometry(lathePoints, polyBudget);
                        } else {
                            // Fallback if formatting fails
                            geo = new THREE.CylinderGeometry(0.5, 0.5, 1, polyBudget);
                        }
                        break;
        
                    case 'extrude':
                        // Procedural generation: Sweeps a custom 2D vector path out along a depth axis
                        if (shapeData.pathPoints && shapeData.pathPoints.length > 0) {
                            const shapePath = new THREE.Shape();
                            shapePath.moveTo(shapeData.pathPoints[0].x, shapeData.pathPoints[0].y);
                            for (let i = 1; i < shapeData.pathPoints.length; i++) {
                                shapePath.lineTo(shapeData.pathPoints[i].x, shapeData.pathPoints[i].y);
                            }
                            
                            const extrudeSettings = {
                                depth: shapeData.extrudeDepth || 0.4,
                                bevelEnabled: true,
                                bevelThickness: 0.04,
                                bevelSize: 0.02,
                                bevelSegments: 4,
                                curveSegments: polyBudget / 2
                            };
                            geo = new THREE.ExtrudeGeometry(shapePath, extrudeSettings);
                            
                            // Center the newly generated custom geometry bounding boxes
                            geo.center();
                        } else {
                            geo = new THREE.BoxGeometry(1, 1, 1);
                        }
                        break;
        
                    default: 
                        geo = new THREE.BoxGeometry(1, 1, 1);
                }
        
                // Switching flatShading to FALSE enables beautiful, smooth phong interpolation 
                // across high-polygon counts for high-fidelity rendering
                const mat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(shapeData.color || "#ffffff"),
                    flatShading: false, 
                    roughness: 0.35,     
                    metalness: 0.15
                });
        
                const mesh = new THREE.Mesh(geo, mat);
                
                // Map transform vectors
                mesh.position.set(shapeData.position.x, shapeData.position.y, shapeData.position.z);
                mesh.scale.set(shapeData.scale.x, shapeData.scale.y, shapeData.scale.z);
                mesh.rotation.set(shapeData.rotation.x, shapeData.rotation.y, shapeData.rotation.z);
        
                worldGroup.add(mesh);
            });
        }

        // 6. 🗑 Clear Scene & Reset View
        function clearSceneAndResetView() {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (gyroActive) {
                window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
                window.removeEventListener('devicemotion', handleHardwareInertialSensors);
                gyroActive = false;
                const gyroBtn = document.getElementById('gyroBtn');
                gyroBtn.classList.remove('btn-active');
            }

            targetVelocity.set(0,0,0);
            currentVelocity.set(0,0,0);
            hardwareActivelySpinning = false;
            telemetryState.x = 0; telemetryState.y = 5; telemetryState.z = 15;
            
            initOrbitControls();
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);
            camera.rotation.set(0, 0, 0);
            camera.quaternion.set(0, 0, 0, 1);
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('debugPanel').innerText = "Cam: Ready | Sensors: Inactive";
            const descDiv = document.getElementById('aiDescription');
            descDiv.style.color = "#aaa";
            descDiv.innerText = "Virtual world reset.\nAim camera and tap ⛶ to scan.";
        }

        // 7. Core Tracking Framework Controls
        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            
            if (gyroActive) {
                window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
                window.removeEventListener('devicemotion', handleHardwareInertialSensors);
                gyroActive = false;
                targetVelocity.set(0,0,0);
                currentVelocity.set(0,0,0);
                hardwareActivelySpinning = false;
                
                initOrbitControls();
                camera.position.set(0, 5, 15);
                camera.rotation.set(0, 0, 0);
                camera.quaternion.set(0, 0, 0, 1);
                controls.update();

                btn.classList.remove('btn-active');
                document.getElementById('debugPanel').innerText = "Cam: Ready | Sensors: Inactive";
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(orientState => {
                            if (orientState === 'granted') {
                                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                                    DeviceMotionEvent.requestPermission().then(motionState => {
                                        if(motionState === 'granted') {
                                            activateTrackingSensors(btn);
                                        } else {
                                            alert("Motion permission required for isolated translation tracking.");
                                        }
                                    });
                                } else {
                                    activateTrackingSensors(btn);
                                }
                            } else {
                                alert("Orientation tracking permission denied by system.");
                            }
                        }).catch(err => console.error(err));
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btnElement) {
            if (controls) {
                controls.dispose();
                controls = null;
            }

            targetVelocity.set(0,0,0);
            currentVelocity.set(0,0,0);
            hardwareActivelySpinning = false;
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleHardwareInertialSensors, true);
            
            gyroActive = true;
            btnElement.classList.add('btn-active');
        }

        // Handle Rotational View Matrix Changes via Gyroscope
        function handleGyroscopeMotionInput(event) {
            if (!gyroActive) return;

            const alpha = (event.alpha !== null && !isNaN(event.alpha)) ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = (event.beta !== null && !isNaN(event.beta)) ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = (event.gamma !== null && !isNaN(event.gamma)) ? THREE.MathUtils.degToRad(event.gamma) : 0;

            const screenAngle = (window.screen && window.screen.orientation && !isNaN(window.screen.orientation.angle)) ? window.screen.orientation.angle : (window.orientation || 0);
            const orient = THREE.MathUtils.degToRad(screenAngle);

            telemetryState.alpha = event.alpha || 0;
            telemetryState.beta = event.beta || 0;
            telemetryState.gamma = event.gamma || 0;

            setObjectQuaternion(camera.quaternion, alpha, beta, gamma, orient);
        }

        // --- NEW ISOLATED HARDWARE INERTIAL LOCOMOTION ENGINE ---
        function handleHardwareInertialSensors(event) {
            if (!gyroActive) return;

            const r = event.rotationRate;
            const accel = event.acceleration; // Pure user-driven force (gravity removed by device hardware)
            
            if (!r || !accel || accel.x === null || accel.z === null) return;

            // 1. HIGH-FREQUENCY GYROSCOPE MUTING CORE
            // If the phone registers rotational speeds beyond the gate ceiling, 
            // the accelerometer input is completely cut to prevent translation spikes during panning.
            if (Math.abs(r.alpha || 0) > SPIN_KILL_LIMIT || 
                Math.abs(r.beta || 0) > SPIN_KILL_LIMIT || 
                Math.abs(r.gamma || 0) > SPIN_KILL_LIMIT) {
                hardwareActivelySpinning = true;
                targetVelocity.set(0, 0, 0);
                return;
            }
            hardwareActivelySpinning = false;

            // 2. ISOLATED ACCELEROMETER PIPELINE
            // Extract raw chassis forces (Z = forward/back, X = left/right strafe)
            let ax = accel.x;
            let az = accel.z;

            // Pass values through a strict noise floor filter to trap micro hand jitter
            if (Math.abs(ax) < ACCEL_DEADZONE) ax = 0;
            if (Math.abs(az) < ACCEL_DEADZONE) az = 0;

            if (ax !== 0 || az !== 0) {
                // Map device local force directions to Three.js orientation space
                // -az pushes forward out into the virtual scene grid layout
                let localForceVector = new THREE.Vector3(ax, 0, -az);
                
                // Align user's physical movement axis with the current viewing direction
                localForceVector.applyQuaternion(camera.quaternion);
                localForceVector.y = 0; // Prevent translation from drifting into the sky or floor
                localForceVector.normalize();

                // Generate impulse push strength proportional to physical momentum force
                let forceMagnitude = Math.sqrt(ax * ax + az * az) * ACCEL_GAIN;
                targetVelocity.copy(localForceVector).setLength(forceMagnitude);
            } else {
                // Apply drag friction when there is no physical user translation force
                targetVelocity.multiplyScalar(SLIDE_FRICTION);
            }
        }

        // 8. Unified Frame Animation Engine Loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls) {
                controls.update(); 
            } else {
                // Interpolate velocities smoothly to remove harsh telemetry spikes
                currentVelocity.lerp(targetVelocity, 0.25);

                // Apply the absolute velocity governor ceiling cap
                if (currentVelocity.length() > MAX_SPEED_CEILING) {
                    currentVelocity.setLength(MAX_SPEED_CEILING);
                }

                // If movement passes minimal float ceilings, update the active position matrix coordinates
                if (currentVelocity.lengthSq() > 0.00001) {
                    camera.position.add(currentVelocity);
                } else {
                    currentVelocity.set(0, 0, 0);
                }

                telemetryState.x = camera.position.x;
                telemetryState.y = camera.position.y;
                telemetryState.z = camera.position.z;
            }

            if (gyroActive) {
                let diagnosticMessage = hardwareActivelySpinning ? "MUTED (Turning View)" : "Inertial Engine Ready";
                document.getElementById('debugPanel').innerText = 
                    `Pos: [${telemetryState.x.toFixed(1)}, ${telemetryState.z.toFixed(1)}] | Hardware state: ${diagnosticMessage}`;
            }
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;
    </script>
</body>
</html>
