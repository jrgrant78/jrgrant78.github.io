<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }

        #controls { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15,15,22,0.9); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .main-interface {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
        }

        #leftContainer {
            display: inline-flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            width: 108px; /* Perfectly bounds 3 buttons of 32px + 2 gaps of 6px */
        }

        .title-row {
            height: 16px;
            line-height: 16px;
            color: #00e5ff;
            font-size: 0.72em;
            font-weight: bold;
            letter-spacing: 0.3px;
            white-space: nowrap;
            width: 100%;
        }

        .icon-row, .btn-toolbar {
            display: flex;
            gap: 6px;
            width: 100%;
            margin: 0;
            height: 32px;
        }

        #togglePanel {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        #uiToggleBtn, #gridToggleBtn, .btn-overlay, button.action-btn { 
            width: 32px; 
            height: 32px; 
            background: #1a1a24; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #uiToggleBtn:active, #gridToggleBtn:active, .btn-overlay:active, button.action-btn:active { transform: scale(0.95); }
        
        button.btn-scan { color: #00e676; border-color: #00e676; } 
        button.btn-gyro { color: #ffea00; border-color: #ffea00; } 
        button.btn-clear { color: #ff1744; border-color: #ff1744; } 
        
        .input-row {
            display: flex;
            align-items: center;
            width: 100%;
            height: 32px;
        }
        .key-input {
            width: 100%;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.75em;
            outline: none;
            height: 32px;
        }
        .key-input:focus { border-color: #00e5ff; }
        
        .btn-active { background: #ffea00 !important; color: #0b0b0f !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        button.btn-overlay.overlay-engaged { background: #00e5ff !important; color: #0b0b0f !important; border-color: #00e5ff !important; }

        #cameraWindow { 
            height: 130px; 
            border: 2px solid #00e5ff; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box;
            position: relative;
            margin-left: auto; /* Guarantees camera framing always tightly hugs the right edge */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: width 0.2s ease;
        }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #libraryPreview { width: 100%; height: 100%; object-fit: cover; display: none; cursor: pointer; }
        #folderPlaceholder { 
            width: 100%; 
            height: 100%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            background: #111116; 
            cursor: pointer; 
            color: #88889c;
        }
        
        #sourceToggleBtn {
            position: absolute;
            bottom: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: rgba(26,26,36,0.85);
            border: 1px solid #555;
            border-radius: 4px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 12;
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #sourceToggleBtn:hover { border-color: #00e5ff; color: #00e5ff; }

        #lowerContent {
            width: 100%;
        }
        #status { color: #ffab00; font-weight: bold; margin-top: 4px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 4px; font-size: 0.75em; color: #aaa; max-height: 150px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.4; width: 100%; box-sizing: border-box; }
        
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 2; pointer-events: auto; touch-action: none; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="controls">
        <div class="main-interface">
            <!-- Unified Left 4-Row Container -->
            <div id="leftContainer">
                <!-- Row 1: Title -->
                <div class="title-row">Spatial Sculptor AR</div>
                
                <!-- Row 2: Always-Visible Utility Icons -->
                <div class="icon-row">
                    <button id="uiToggleBtn" title="Toggle UI Controls">
                        <svg width="18" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                        </svg>
                    </button>
                    <button id="gridToggleBtn" class="btn-active" title="Toggle Navigation Grid">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
                            <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>

                            </svg>
                        </button>

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle>
                                <line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line>
                            </svg>
                        </button>
                        <button id="clearBtn" class="action-btn btn-clear" title="Reset Scene">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>

                    <!-- Row 4: API Key Field -->
                    <div class="input-row">
                        <input type="password" id="apiKeyField" class="key-input" placeholder="Key...">
                    </div>
                </div>
            </div>
            
            <!-- Right Pinned Discrete Aspect Camera Viewport -->
            <div id="cameraWindow">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <img id="libraryPreview" alt="Device selection display element">
                <div id="folderPlaceholder">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <button id="sourceToggleBtn" title="Switch Input Type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Screen-Width Bottom Logging Terminal Panel -->
        <div id="lowerContent">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div id="status">Deconstructing spatial geometry orientation...</div>
            <div id="aiDescription">Awaiting snapshot capture execution sequence...</div>
        </div>
    </div>

    <div id="debugPanel">System Initializing...</div>
    <canvas id="canvas3d"></canvas>

    <script>
        let scene, camera, renderer, controls, gridHelper;
        let videoElement, localStream;
        
        let gyroActive = false;
        let isFirstGyroFrame = false;
        let lockedGyroRoll = 0; 
        const cleanTargetQuaternion = new THREE.Quaternion(); 
        
        let gyroYawOffset = 0;
        let lastCameraQuaternion = new THREE.Quaternion();
        
        let targetLinearVelocityX = 0;
        let targetLinearVelocityZ = 0;
        const VELOCITY_INTERPOLATION_STEP = 0.22; 
        const VELOCITY_DEADZONE_LIMIT = 0.001;

        let motionTracker;
        const LEVEL_PITCH_LIMIT = THREE.MathUtils.degToRad(20);  
        const LEVEL_ROLL_LIMIT = THREE.MathUtils.degToRad(15);   
        const ROTATIONAL_BLANKING_THRESHOLD = 0.005; 
        
        const TRANSLATION_SPEED_SCALAR = 0.65;                   
        let visualTelemetry = { scaleFlow: 0, panFlow: 0, gated: true };
        
        const worldGroup = new THREE.Group();
        let scanInProgress = false;
        
        let dynamicInputSourceMode = 'camera';
        let scannedBackdropDataUrl = null;
        let backdropOverlayActive = false;
        let floatingBackdropMesh = null; 
        let rawCachedShapesArray = null;  

        let telemetryState = { x: 0, y: 2.0, z: 25.0 };

        // SPATIAL MANIPULATION WORKSPACE REGISTERS
        let raycaster = new THREE.Raycaster();
        let pointerCoordinateVector = new THREE.Vector2();
        let isDraggingSceneActive = false;
        let isStructureReadyToMove = false;
        let sceneDragLongPressTimeout = null;
        let interactiveDragOffset = new THREE.Vector3();
        let groundReferencePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        // Gesture verification metrics
        let startScreenPosition = { x: 0, y: 0 };
        const DRAG_CANCEL_THRESHOLD = 8; // Max pixel drift allowed during long press validation

        const OPEN_EYE_SVG = `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const CLOSED_EYE_SVG = `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10c4 4 14 4 18 0"/><path d="M6 11.5l-1 2"/><path d="M12 13v3"/></svg>`;

        const ICON_CAMERA_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"/></svg>`;
        const ICON_PHOTO_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"></polyline></svg>`;

        class MultiPointMotionTracker {
            constructor() {
                this.canvas = document.createElement('canvas');
                this.canvas.width = 64;
                this.canvas.height = 64;
                this.ctx = this.canvas.getContext('2d');
                this.prevBuffer = new Uint8ClampedArray(64 * 64);
                this.initialized = false;
                
                this.trackingPoints = [
                    {x: 16, y: 16}, {x: 32, y: 16}, {x: 48, y: 16},
                    {x: 16, y: 32}, {x: 32, y: 32}, {x: 48, y: 32},
                    {x: 16, y: 48}, {x: 32, y: 48}, {x: 48, y: 48}
                ];
            }

            analyze(video) {
                if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return { scale: 0, pan: 0 };
                
                this.ctx.drawImage(video, 0, 0, 64, 64);
                const frameData = this.ctx.getImageData(0, 0, 64, 64).data;
                
                let curBuffer = new Uint8ClampedArray(64 * 64);
                let curTotalLuma = 0;
                let prevTotalLuma = 0;

                for (let i = 0; i < 64 * 64; i++) {
                    curBuffer[i] = (frameData[i*4] + frameData[i*4+1] + frameData[i*4+2]) / 3;
                    curTotalLuma += curBuffer[i];
                    if (this.initialized) prevTotalLuma += this.prevBuffer[i];
                }

                if (!this.initialized) {
                    this.prevBuffer.set(curBuffer);
                    this.initialized = true;
                    return { scale: 0, pan: 0 };
                }

                const lumaBalanceOffset = (curTotalLuma - prevTotalLuma) / 4096.0;

                let totalVectorX = 0;
                let totalExpansion = 0;
                const searchRadius = 5;
                
                let activeMotionBlocksCount = 0;

                for (let pt of this.trackingPoints) {
                    let bestSAD = Infinity;
                    let mvX = 0;
                    let mvY = 0;

                    for (let sy = -searchRadius; sy <= searchRadius; sy++) {
                        for (let sx = -searchRadius; sx <= searchRadius; sx++) {
                            let sad = 0;
                            for (let wy = -1; wy <= 1; wy++) {
                                for (let wx = -1; wx <= 1; wx++) {
                                    const oldX = pt.x + wx;
                                    const oldY = pt.y + wy;
                                    const newX = pt.x + wx + sx;
                                    const newY = pt.y + wy + sy;

                                    if (oldX >= 0 && oldX < 64 && oldY >= 0 && oldY < 64 &&
                                        newX >= 0 && newX < 64 && newY >= 0 && newY < 64) {
                                        const normalizedCurPixel = curBuffer[newY * 64 + newX] - lumaBalanceOffset;
                                        sad += Math.abs(normalizedCurPixel - this.prevBuffer[oldY * 64 + oldX]);
                                    }
                                }
                            }

                            if (sad < bestSAD) {
                                bestSAD = sad;
                                mvX = sx;
                                mvY = sy;
                            }
                        }
                    }

                    if (mvX !== 0 || mvY !== 0) {
                        activeMotionBlocksCount++;
                    }

                    totalVectorX += mvX;
                    const vecFromCenterValX = pt.x - 32;
                    const vecFromCenterValY = pt.y - 32;
                    totalExpansion += (mvX * vecFromCenterValX) + (mvY * vecFromCenterValY);
                }

                this.prevBuffer.set(curBuffer);

                if (activeMotionBlocksCount < 5) {
                    return { scale: 0, pan: 0 };
                }

                let rawPan = -(totalVectorX / 9.0) * 0.25;
                let rawScale = (totalExpansion / 9.0) * 0.015;

                if (Math.abs(rawPan) < 0.14) rawPan = 0;
                if (Math.abs(rawScale) < 0.10) rawScale = 0;

                return {
                    scale: THREE.MathUtils.clamp(rawScale, -0.2, 0.2),
                    pan: THREE.MathUtils.clamp(rawPan, -0.2, 0.2)
                };
            }
        }

        const getSensorQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( alpha, beta, gamma, orient ) {
                const q = new THREE.Quaternion();
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                q.setFromEuler( euler ); 
                q.multiply( q1 ); 
                q.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
                return q;
            };
        })();

        function createRoundedBoxGeometry(w, h, d, radius, segments) {
            w = Math.max(w, 0.05); h = Math.max(h, 0.05); d = Math.max(d, 0.05);
            const r = Math.min(radius, Math.min(w, h) * 0.45);
            const shape = new THREE.Shape();
            const x = -w / 2, y = -h / 2;
            
            shape.moveTo(x, y + r);
            shape.lineTo(x, y + h - r);
            shape.quadraticCurveTo(x, y + h, x + r, y + h);
            shape.lineTo(x + w - r, y + h);
            shape.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
            shape.lineTo(x + w, y + r);
            shape.quadraticCurveTo(x + w, y, x + w - r, y);
            shape.lineTo(x + r, y);
            shape.quadraticCurveTo(x, y, x, y + r);

            const geo = new THREE.ExtrudeGeometry(shape, {
                depth: Math.max(0.01, d - (2 * r)),
                bevelEnabled: true,
                bevelSegments: segments,
                steps: 1,
                bevelSize: r,
                bevelThickness: r,
                curveSegments: segments * 2
            });
            geo.center();
            return geo;
        }

        function extractCleanJsonObject(rawText) {
            const firstOpen = rawText.indexOf('{');
            if (firstOpen === -1) throw new Error("Object boundary missing.");
            let depth = 0;
            for (let i = firstOpen; i < rawText.length; i++) {
                if (rawText[i] === '{') depth++;
                else if (rawText[i] === '}') {
                    depth--;
                    if (depth === 0) return rawText.substring(firstOpen, i + 1);
                }
            }
            throw new Error("Mismatched block bounds.");
        }

        function resizeCameraViewport() {
            const cameraWin = document.getElementById('cameraWindow');
            if (!cameraWin) return;
            
            const availableWidth = window.innerWidth - 20 - 24 - 108 - 12;
            
            let targetWidth = 73; 
            if (availableWidth >= 231) {
                targetWidth = 231; 
            } else if (availableWidth >= 130) {
                targetWidth = 130; 
            }
            
            cameraWin.style.width = targetWidth + 'px';
            cameraWin.style.flexGrow = '0';
        }

        function init3D() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('apiKeyField').value = urlKey.trim();
                document.getElementById('aiDescription').innerHTML = "Ready to scan scene!<br>Gemini API Key loaded.";
            }

            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x06060a);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            initOrbitControls();
            
            motionTracker = new MultiPointMotionTracker();

            gridHelper = new THREE.GridHelper(50, 50, 0xb0b0b0, 0x777777);
            gridHelper.position.y = 0.0; 
            gridHelper.visible = true;
            scene.add(gridHelper);

            scene.add(new THREE.AmbientLight(0xffffff, 0.35));
            
            const keyLight = new THREE.DirectionalLight(0xfffecb, 1.4);
            keyLight.position.set(15, 25, 20);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 1024;
            keyLight.shadow.mapSize.height = 1024;
            keyLight.shadow.bias = -0.001;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xdbe7ff, 0.5);
            fillLight.position.set(-15, 10, 10);
            scene.add(fillLight);

            scene.add(worldGroup);

            // POINTER INTERACTION WORKSPACE LISTENERS
            canvas.addEventListener('pointerdown', handleScenePointerDownActivation, { passive: false });
            window.addEventListener('pointermove', handleScenePointerDragSequence, { passive: false });
            window.addEventListener('pointerup', handleScenePointerUpRelease);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);
            document.getElementById('uiToggleBtn').addEventListener('click', toggleControlPanelsVisibility);
            document.getElementById('overlayToggleBtn').addEventListener('click', toggleSpatialBackdropOverlay);
            
            document.getElementById('gridToggleBtn').addEventListener('click', () => {
                if (gridHelper) {
                    gridHelper.visible = !gridHelper.visible;
                    document.getElementById('gridToggleBtn').classList.toggle('btn-active', gridHelper.visible);
                }
            });

            document.getElementById('sourceToggleBtn').addEventListener('click', toggleInputSourceMode);
            document.getElementById('folderPlaceholder').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('libraryPreview').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('fileInput').addEventListener('change', handleDeviceFileSelection);

            initRearCameraStreamGracefully();
            resizeCameraViewport();
            animate();
        }

        // DYNAMIC SPATIAL MANIPULATION EVENT HANDLERS
        function handleScenePointerDownActivation(e) {
            pointerCoordinateVector.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointerCoordinateVector.y = -(e.clientY / window.innerHeight) * 2 + 1;

            // Cache metrics for drag cancellation evaluation thresholds
            startScreenPosition.x = e.clientX;
            startScreenPosition.y = e.clientY;

            raycaster.setFromCamera(pointerCoordinateVector, camera);
            const targetedStructuralIntersects = raycaster.intersectObjects(worldGroup.children, true);

            if (targetedStructuralIntersects.length > 0) {
                let groundIntersectionVector = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundReferencePlane, groundIntersectionVector);
                interactiveDragOffset.copy(groundIntersectionVector).sub(worldGroup.position);

                if (sceneDragLongPressTimeout) clearTimeout(sceneDragLongPressTimeout);
                
                isStructureReadyToMove = false;
                isDraggingSceneActive = false;

                // Gated Long-Press Sequence: Verification threshold enforces steady click behaviors
                sceneDragLongPressTimeout = setTimeout(() => {
                    isStructureReadyToMove = true;
                    isDraggingSceneActive = true;
                    
                    if (controls) controls.enabled = false; // Decouple camera interactions during sliding sequence

                    // Apply emissive visual highlight matrix onto PBR material tree components
                    worldGroup.traverse((child) => {
                        if (child.isMesh && child.material) {
                            if (child.userData.originalEmissive === undefined) {
                                child.userData.originalEmissive = child.material.emissive.getHex();
                            }
                            child.material.emissive.setHex(0x224466); // Subtle cyan highlights indicate ready-to-move parameters
                        }
                    });

                    document.getElementById('aiDescription').innerText = "[Active Mode: Translating Structure]\nSlide to reposition. Elements will snap to full integer grid cells.";
                }, 400); 
            }
        }

        function handleScenePointerDragSequence(e) {
            // Early out if no raycast context register is pending validation
            if (!isDraggingSceneActive && !sceneDragLongPressTimeout) return;

            const currentPixelDeltaX = Math.abs(e.clientX - startScreenPosition.x);
            const currentPixelDeltaY = Math.abs(e.clientY - startScreenPosition.y);

            // Gated Cancellation Logic: Early motion before long press fires reverts seamlessly to normal camera behavior
            if (!isStructureReadyToMove) {
                if (currentPixelDeltaX > DRAG_CANCEL_THRESHOLD || currentPixelDeltaY > DRAG_CANCEL_THRESHOLD) {
                    if (sceneDragLongPressTimeout) {
                        clearTimeout(sceneDragLongPressTimeout);
                        sceneDragLongPressTimeout = null;
                    }
                }
                return; // Let OrbitControls execute default horizon rotation calculations uninterrupted
            }

            // Execute translation update vectors since long press validation is fully confirmed
            e.preventDefault();
            pointerCoordinateVector.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointerCoordinateVector.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointerCoordinateVector, camera);
            let currentGroundIntersection = new THREE.Vector3();
            raycaster.ray.intersectPlane(groundReferencePlane, currentGroundIntersection);

            let intendedTargetPosition = currentGroundIntersection.sub(interactiveDragOffset);
            
            // WHOLE INTEGER SHAPE SNAPPING MATRIX PROTOCOL
            worldGroup.position.x = Math.round(intendedTargetPosition.x);
            worldGroup.position.z = Math.round(intendedTargetPosition.z);
        }

        function handleScenePointerUpRelease() {
            if (sceneDragLongPressTimeout) {
                clearTimeout(sceneDragLongPressTimeout);
                sceneDragLongPressTimeout = null;
            }
            
            // Teardown highlight matrix indicators and restore initial mesh specifications cleanly
            worldGroup.traverse((child) => {
                if (child.isMesh && child.material && child.userData.originalEmissive !== undefined) {
                    child.material.emissive.setHex(child.userData.originalEmissive);
                }
            });

            if (isDraggingSceneActive) {
                isDraggingSceneActive = false;
                isStructureReadyToMove = false;
                if (controls) controls.enabled = true; // Restore OrbitControls functionality safely
                document.getElementById('aiDescription').innerText = "Structure transform committed. Vector targets aligned cleanly on cell bounds.";
            }
        }

        async function captureAndScanFrame() {

                ctx.drawImage(libraryImg, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            }
            
            scannedBackdropDataUrl = hiddenCanvas.toDataURL('image/jpeg');
            const base64Image = scannedBackdropDataUrl.split(',')[1];

            scanInProgress = true;
            scanBtn.disabled = true;
            statusDiv.style.display = 'block';

            const modelCascadeList = [
                'gemini-3.5-flash',
                'gemini-3.1-pro-preview',
                'gemini-3-flash-preview',
                'gemini-2.5-pro',
                'gemini-3.1-flash-lite'
            ];
            
            let parsedPayload = null;
            let unifiedShapes = [];
            let successfulPass1Model = "none";
            let debugDiagnosticsHistory = "";

            const pass1Prompt = `
                Act as an advanced open-world 3D Spatial Scaffolder. Analyze this image frame completely.
                Your response must populate exactly two fields inside the target JSON object:
                1. description: Provide a detailed text summary describing the exact subjects, furniture pieces, textures, layout colors, background architecture, or items observed in the current camera view.
                2. blueprint: An architectural text blueprint manifest listing an ultra-dense array of raw description lines. You MUST generate at least 80 to 120 individual items total, distributed evenly across the following four headers:
                
                ### REGION: FOUNDATION
                ### REGION: CORE_MASSES
                ### REGION: EXTENSIONS
                ### REGION: ACCENTS
                
                STRICT KINEMATIC CHAINING LAW:

                "- type=[type], material=[material], color=[hex], position=[x,y,z], scale=[x,y,z], rotation=[x,y,z]"
            `;

            const globalSpatialAnchorPrompt = `
                Global Space Coordinates Alignment Protocol:
                - Center origin point is at (0, 0, 0). Ground level/floor planes should sit exactly at y = 0.
                
                STRICT COMPILER ARRAYS QUOTA ENFORCEMENT:
                - Smaller inference models naturally compress geometric details. You are STRICTLY FORBIDDEN from summarizing or combining distinct objects into large single primitive configurations.
                - Deconstruct every single structural component description into a matrix of smaller, individual micro-primitives.
                - You MUST generate a minimum array allocation of 15 to 25 distinct shape items inside your JSON shapes list for this specific assigned task worker to ensure high spatial granularity.
                
                STRICT KINEMATIC CHAIN MECHANICS:
                - THE MIDPOINT VECTOR LAW: In Three.js, a cylinder or capsule positions itself from its exact geometric center point. When constructing any limb or connecting bar extending from Joint A [x1, y1, z1] to Joint B [x2, y2, z2], you MUST calculate the position vector as the absolute mathematical midpoint: [(x1+x2)/2, (y1+y2)/2, (z1+z2)/2].
                - PARENT ANCHORING MANDATE: Forearms must touch upper arms, upper arms must touch torsos, legs must meet structural bases perfectly.
                
                EXPLICIT ANGULAR RADIAN ROTATION LOOKUP:
                - To angle elements realistically without detached drift, look up and apply these precise Euler pitch/roll constants inside your rotation array [r_x, r_y, r_z]:
                  * Perfect Horizontal (Flat Plane Parallel): 1.57 (90 degrees)
                  * Upward/Downward 45-Degree Slant: 0.79 (45 degrees) or -0.79
                  * Vertical Straight Alignment: 0.0 (0 degrees)
                
                COMPILER OPTIMIZATION CAVEATS:
                - CAVEAT 1: Round all spatial floats (p, s, r) strictly to a max of 2 decimal places.
                - CAVEAT 2: Eliminate all optional whitespace padding inside the array syntax strings.
            `;

            pass1ModelLoop: for (let model of modelCascadeList) {
                try {
                    statusDiv.innerText = `Pass 1: Prompting ${model}...`;
                    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + userEnteredKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass1Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: { description: { type: "STRING" }, blueprint: { type: "STRING" } },
                                    required: ["description", "blueprint"]
                                }
                            }
                        })
                    });

                    if (!res.ok) {
                        const errorDetailsText = await res.text();
                        debugDiagnosticsHistory += `• Pass 1 [${model}] Error ${res.status}: ${errorDetailsText.substring(0, 100)}...<br>`;
                        continue;
                    }

                    const data = await res.json();
                    if (data.error) {
                        debugDiagnosticsHistory += `• Pass 1 [${model}] API Error: ${data.error.message}<br>`;
                        continue;
                    }

                    parsedPayload = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                    if (parsedPayload && parsedPayload.blueprint) {
                        successfulPass1Model = model;
                        break pass1ModelLoop; 
                    }
                } catch (e) { 
                    debugDiagnosticsHistory += `• Pass 1 [${model}] Exception: ${e.message}<br>`;
                }
            }

            if (!parsedPayload || !parsedPayload.blueprint) {
                descDiv.innerHTML = `<span style='color:#ff3333; font-weight:bold;'>Pass 1 Fatal Failure</span>`;
                if (debugDiagnosticsHistory) descDiv.innerHTML += `<br><br><div style='width: 100%; background:#221b11; padding:8px;'><b>Error Log:</b><br>${debugDiagnosticsHistory}</div>`;
                scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
                return;
            }

            const structuralTasks = [
                { id: 'FOUNDATION', subId: 'PRIMITIVES', rules: 'Look ONLY at the ### REGION: FOUNDATION area text blocks. Compile only the large flat floor bases, ground platforms, and main support mats.' },
                { id: 'FOUNDATION', subId: 'SURFACE', rules: 'Look ONLY at the ### REGION: FOUNDATION area text blocks. Compile the detailed surface boundaries, secondary rug mats, and floor borders.' },
                { id: 'CORE_MASSES', subId: 'FURNITURE', rules: 'Look ONLY at the ### REGION: CORE_MASSES area text blocks. Compile the massive primary backing blocks of couches, structural seating, and main table anchors.' },
                { id: 'CORE_MASSES', subId: 'CUSHIONS', rules: 'Look ONLY at the ### REGION: CORE_MASSES area text blocks. Compile the softer geometric overlays, layered cushions, padding, or central subject components.' },
                { id: 'EXTENSIONS', subId: 'FRAMES', rules: 'Look ONLY at the ### REGION: EXTENSIONS area text blocks. Compile vertical boundaries, TV panels, display stands, cabinet structures, and wall hangings.' },
                { id: 'EXTENSIONS', subId: 'LIMBS', rules: 'Look ONLY at the ### REGION: EXTENSIONS area text blocks. CRITICAL INTERLOCK INSTRUCTION: Compile connecting arms, legs, or hardware rods. Ensure their midpoint positions map precisely between their parent joints so they latch together cleanly without floating gaps.' },
                { id: 'ACCENTS', subId: 'ITEMS', rules: 'Look ONLY at the ### REGION: ACCENTS area text blocks. Compile standalone accent blocks, secondary decorative nodes, and objects scattered on surfaces.' },
                { id: 'ACCENTS', subId: 'TRIM', rules: 'Look ONLY at the ### REGION: ACCENTS area text blocks. Compile micro-geometric additions, small texturing adjustments, color highlights, and edge borders.' }
            ];

            let permanentPass2Logs = "";

            const regionalCompilationPromises = structuralTasks.map(async (task, idx) => {
                await delayExecutionTime(idx * 250);

                const pass2Prompt = `
                    You are a precision 3D Geometry compiler worker focusing strictly on the [${task.id} -> ${task.subId}] sub-layer.
                    Convert your targeted segment lines into a highly minified JSON shapes layout array.
                    
                    ${globalSpatialAnchorPrompt}
                    
                    MASTER BLUEPRINT MANIFEST REFERENCE CONTEXT:
                    """
                    ${parsedPayload.blueprint}
                    """
                    
                    YOUR COMPILER TARGET INSTRUCTIONS:
                    - ${task.rules}
                    - Read the full blueprint context map to ensure the spatial alignment vectors match parent joints perfectly. Do not let elements float disconnected in empty coordinates space.
                    - Output purely your sub-layer target items without duplication.
                `;

                for (let model of modelCascadeList) {
                    try {
                        statusDiv.innerText = `Pass 2: Compiling [${task.id}_${task.subId}] via ${model}...`;
                        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + userEnteredKey, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: pass2Prompt }] }], 
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            shapes: {
                                                type: "ARRAY",
                                                items: {
                                                    type: "OBJECT",
                                                    properties: {
                                                        t: { type: "STRING", description: "type: box, roundedbox, sphere, cylinder, cone, capsule, plane" }, 
                                                        p: { type: "ARRAY", items: { type: "NUMBER" }, description: "position [x, y, z]" },
                                                        s: { type: "ARRAY", items: { type: "NUMBER" }, description: "scale [x, y, z]" },
                                                        r: { type: "ARRAY", items: { type: "NUMBER" }, description: "rotation [x, y, z] in radians" },
                                                        c: { type: "STRING", description: "hex color code" },
                                                        rough: { type: "NUMBER", description: "roughness float 0.0 to 1.0" },
                                                        metal: { type: "NUMBER", description: "metalness float 0.0 to 1.0" },
                                                        trans: { type: "NUMBER", description: "transmission float 0.0 to 1.0" }
                                                    },
                                                    required: ["t", "p", "s", "r", "c", "rough", "metal", "trans"]
                                                }
                                            }
                                        },
                                        required: ["shapes"]
                                    }
                                }
                            })
                        });

                        if (res.ok) {
                            const data = await res.json();
                            const parsed = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                            return { id: `${task.id}_${task.subId}`, model: model, shapes: parsed.shapes || [] };
                        } else {
                            permanentPass2Logs += `• Layer [${task.id}_${task.subId}] Fallback: ${model} failed (Status ${res.status})<br>`;
                        }
                    } catch (e) {
                        permanentPass2Logs += `• Layer [${task.id}_${task.subId}] Exception: ${model} encountered tracking error<br>`;
                    }
                }
                return { id: `${task.id}_${task.subId}`, model: "failed", shapes: [] };
            });

            try {
                const compiledResults = await Promise.all(regionalCompilationPromises);
                
                let reportTrackingLog = "<br><br><b>8-Layer High Density Balanced Core Audit Verification Log:</b>";
                compiledResults.forEach((result) => {
                    if (result && Array.isArray(result.shapes)) {
                        unifiedShapes.push(...result.shapes);
                    }
                    let modelStatusColor = result.model.includes('pro') || result.model.includes('3.5') ? '#00e676' : '#ffab00';
                    reportTrackingLog += `<br>• Layer [${result.id}] compiled via <span style='color:${modelStatusColor}; font-weight:bold;'>${result.model}</span> (${result.shapes ? result.shapes.length : 0} nodes successfully parsed)`;
                });

                let coreLayoutNarrative = `<b>[Orchestrator: ${successfulPass1Model}]</b><br>${parsedPayload.description}`;
                let structuredUiOutput = coreLayoutNarrative + reportTrackingLog;

                if (debugDiagnosticsHistory || permanentPass2Logs) {
                    structuredUiOutput += `<br><br><div style='background:#221b11; border:1px solid #ffab00; padding:8px; border-radius:4px; font-family:monospace; font-size:0.9em; box-sizing:border-box; width:100%;'><b>System Connection Diagnostics Trail:</b><br>${debugDiagnosticsHistory}${permanentPass2Logs}</div>`;
                }

                descDiv.innerHTML = structuredUiOutput;
                if (unifiedShapes.length > 0) {
                    rawCachedShapesArray = unifiedShapes;
                    renderAIBlueprint(unifiedShapes);
                } else {
                    descDiv.innerHTML += "<br><span style='color:#ffea00;'>Warning: Pipeline completed, but the total accumulated shape array contains 0 elements.</span>";
                }
            } catch (err) {
                console.error(err);
                descDiv.innerHTML = `<span style='color:#ff3333; font-weight:bold;'>Pipeline processing exception occurred:</span> <code style='background:#221111; color:#ff8888; padding:3px;'>${err.message}</code>`;
            }

            scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
        }

        function renderAIBlueprint(shapesArray) {
            worldGroup.position.set(0, 0, 0);

            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (floatingBackdropMesh) {
                if (floatingBackdropMesh.geometry) floatingBackdropMesh.geometry.dispose();
                if (floatingBackdropMesh.material) {
                    if (floatingBackdropMesh.material.map) floatingBackdropMesh.material.map.dispose();
                    floatingBackdropMesh.material.dispose();
                }
                scene.remove(floatingBackdropMesh);
                floatingBackdropMesh = null;
            }

            shapesArray.forEach(shape => {
                if (!shape || typeof shape !== 'object') return;
                
                let geo;
                const pos = shape.p || [0,0,0];
                const scl = shape.s || [1,1,1];
                const rot = shape.r || [0,0,0];
                
                const primitiveType = shape.t ? String(shape.t).toLowerCase().trim() : 'box';

                switch(primitiveType) {
                    case 'box': 
                        geo = new THREE.BoxGeometry(1, 1, 1); 
                        break;
                    case 'roundedbox': 
                        geo = createRoundedBoxGeometry(scl[0]||1, scl[1]||1, scl[2]||1, Math.min(scl[0]||1, scl[1]||1, scl[2]||1) * 0.15, 4); 
                        break;
                    case 'sphere': 
                        geo = new THREE.SphereGeometry(0.5, 32, 32); 
                        break;
                    case 'cylinder': 
                        geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32); 
                        break;
                    case 'cone':
                        geo = new THREE.ConeGeometry(0.5, 1, 32);
                        break;
                    case 'capsule':
                        geo = new THREE.CylinderGeometry(0.4, 0.4, 1.0, 32);
                        break;
                    case 'plane':
                        geo = new THREE.PlaneGeometry(1, 1);
                        break;
                    default: 
                        geo = new THREE.BoxGeometry(1, 1, 1);
                }

                const isTranslucent = shape.trans > 0.05;
                const mat = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color(shape.c || "#ffffff"),
                    roughness: shape.rough !== undefined ? THREE.MathUtils.clamp(shape.rough, 0, 1) : 0.4,
                    metalness: shape.metal !== undefined ? THREE.MathUtils.clamp(shape.metal, 0, 1) : 0.0,
                    transmission: shape.trans !== undefined ? THREE.MathUtils.clamp(shape.trans, 0, 1) : 0.0,
                    ior: isTranslucent ? 1.52 : 1.0, 
                    thickness: isTranslucent ? 1.0 : 0.0, 
                    transparent: isTranslucent,
                    side: primitiveType === 'plane' ? THREE.DoubleSide : THREE.FrontSide,
                    clearcoat: shape.metal > 0.5 ? 0.3 : 0.0, 
                    clearcoatRoughness: 0.1
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(pos[0], pos[1], pos[2]);
                mesh.rotation.set(rot[0], rot[1], rot[2]);
                
                if (primitiveType !== 'roundedbox') {
                    mesh.scale.set(scl[0], scl[1], scl[2]);
                }
                
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                worldGroup.add(mesh);
            });

            if (worldGroup.children.length > 0) {
                const box = new THREE.Box3().setFromObject(worldGroup);
                const center = new THREE.Vector3(); 
                box.getCenter(center);
                
                worldGroup.position.x = -center.x;
                worldGroup.position.z = -center.z;
                worldGroup.position.y = -box.min.y; 

                if (scannedBackdropDataUrl) {
                    const size = new THREE.Vector3(); box.getSize(size);
                    const texture = new THREE.TextureLoader().load(scannedBackdropDataUrl);
                    floatingBackdropMesh = new THREE.Mesh(
                        new THREE.PlaneGeometry(1, 1),
                        new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
                    );
                    floatingBackdropMesh.position.set(0, center.y - box.min.y, -size.z / 2 - 1.5);
                    floatingBackdropMesh.scale.set(Math.max(size.x, 6), Math.max(size.y, 6), 1);
                    floatingBackdropMesh.visible = backdropOverlayActive;
                    scene.add(floatingBackdropMesh);
                }
            }
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                deactivateTrackingSensors();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    Promise.all([
                        DeviceOrientationEvent.requestPermission(),
                        typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function' ? 
                            DeviceMotionEvent.requestPermission() : Promise.resolve('granted')
                    ]).then(states => {
                        if (states.every(s => s === 'granted')) activateTrackingSensors(btn);
                    });
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btn) {
            if (controls) { 
                controls.enabled = false; 
            }
            isFirstGyroFrame = true;
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            window.addEventListener('devicemotion', handleInertialStepInput, true);
            gyroActive = true;
            btn.classList.add('btn-active');
        }

        function deactivateTrackingSensors() {
            if (!gyroActive) return;
            window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
            window.removeEventListener('devicemotion', handleInertialStepInput);
            gyroActive = false;
            targetLinearVelocityX = 0;
            targetLinearVelocityZ = 0;
            document.getElementById('gyroBtn').classList.remove('btn-active');
            
            const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            lockedGyroRoll = euler.z; 
            
            euler.z = 0;
            camera.quaternion.setFromEuler(euler);
            camera.updateMatrix();
            camera.updateMatrixWorld(true);
            
            const currentForwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const explicitTargetPoint = new THREE.Vector3().copy(camera.position).addScaledVector(currentForwardDir, 10);
            
            camera.lookAt(explicitTargetPoint);
            
            if (controls) {
                controls.dispose();
            }
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.copy(explicitTargetPoint);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();
        }

        function clearSceneAndResetView() {
            console.clear();
            while(worldGroup.children.length > 0) {
                let c = worldGroup.children[0];
                if(c.geometry) c.geometry.dispose();
                if(c.material) c.material.dispose();
                worldGroup.remove(c);
            }
            deactivateTrackingSensors();
            lockedGyroRoll = 0; 
            targetLinearVelocityX = 0;
            targetLinearVelocityZ = 0;
            rawCachedShapesArray = null;
            scannedBackdropDataUrl = null;
            gyroYawOffset = 0;
            
            camera.position.set(0, 2.0, 25.0);
            if (controls) {
                controls.target.set(0, 0, 0); 
                controls.update();
            }
            document.getElementById('aiDescription').innerText = "Workspace cleared. System active.";
        }

        function handleGyroscopeMotionInput(e) {
            if (!gyroActive) return;
            
            let alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            let beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            let gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
            let orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

            let qSensor = getSensorQuaternion(alpha, beta, gamma, orient);
            let sensorEuler = new THREE.Euler().setFromQuaternion(qSensor, 'YXZ');

            if (isFirstGyroFrame) {
                let currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                gyroYawOffset = currentEuler.y - sensorEuler.y;
                isFirstGyroFrame = false;
            }

            sensorEuler.y += gyroYawOffset;
            camera.quaternion.setFromEuler(sensorEuler);
        }

        function handleInertialStepInput(e) {
            if (!gyroActive) return;

            let acc = e.acceleration; 
            if (!acc || acc.x === null) return;

            const currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            const horizonLevelEngaged = (Math.abs(currentEuler.x) <= LEVEL_PITCH_LIMIT && Math.abs(currentEuler.z) <= LEVEL_ROLL_LIMIT);
            
            if (!horizonLevelEngaged) {
                targetLinearVelocityX = 0;
                targetLinearVelocityZ = 0;
                return;
            }

            const localAccelerationVector = new THREE.Vector3(acc.x, acc.y, acc.z);
            const worldSpaceAcceleration = localAccelerationVector.clone().applyQuaternion(camera.quaternion);

            worldSpaceAcceleration.y = 0;

            const hardwareJitterFloor = 0.08; 
            if (worldSpaceAcceleration.length() < hardwareJitterFloor) {
                return;
            }

            const ACCELERATION_INTEGRATION_GAIN_Z = 0.025;
            const ACCELERATION_INTEGRATION_GAIN_X = 0.006; 
            targetLinearVelocityX -= worldSpaceAcceleration.x * ACCELERATION_INTEGRATION_GAIN_X;
            targetLinearVelocityZ -= worldSpaceAcceleration.z * ACCELERATION_INTEGRATION_GAIN_Z;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            let statusHorizonStr = "LOCKED";
            
            if (gyroActive) {
                const currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                
                if (Math.abs(currentEuler.x) <= LEVEL_PITCH_LIMIT && Math.abs(currentEuler.z) <= LEVEL_ROLL_LIMIT) {
                    statusHorizonStr = "LEVEL_WALK";
                } else {
                    statusHorizonStr = "TILT_GATED";
                    targetLinearVelocityX = 0;
                    targetLinearVelocityZ = 0;
                }

                const INTEGRATION_LEAK_DECAY = 0.78;
                targetLinearVelocityX *= INTEGRATION_LEAK_DECAY;
                targetLinearVelocityZ *= INTEGRATION_LEAK_DECAY;

                if (Math.abs(targetLinearVelocityX) < VELOCITY_DEADZONE_LIMIT) targetLinearVelocityX = 0;
                if (Math.abs(targetLinearVelocityZ) < VELOCITY_DEADZONE_LIMIT) targetLinearVelocityZ = 0;

                if (targetLinearVelocityX !== 0 || targetLinearVelocityZ !== 0) {
                    camera.position.x += targetLinearVelocityX;
                    camera.position.z += targetLinearVelocityZ;
                    
                    if (controls) {
                        controls.target.x += targetLinearVelocityX;
                        controls.target.z += targetLinearVelocityZ;
                    }
                }
            }

            if (controls && controls.enabled) {
                controls.update();
                if (!gyroActive && lockedGyroRoll !== 0) {
                    cleanTargetQuaternion.copy(camera.quaternion);
                    camera.rotateZ(lockedGyroRoll);
                }
            }
            
            telemetryState.x = camera.position.x;
            telemetryState.z = camera.position.z;
            
            // INFINITE SECURE TRACKING GRID ENGINE: Snaps the horizontal space container along modular cell boundaries
            if (gridHelper && gridHelper.visible) {
                gridHelper.position.x = Math.round(camera.position.x);
                gridHelper.position.z = Math.round(camera.position.z);
            }
            
            document.getElementById('debugPanel').innerText = `Coord: X:${telemetryState.x.toFixed(2)} Z:${telemetryState.z.toFixed(2)} | VelX:${targetLinearVelocityX.toFixed(3)} VelZ:${targetLinearVelocityZ.toFixed(3)} Mode:${statusHorizonStr} | Nodes: ${worldGroup.children.length}`;
            
            renderer.render(scene, camera);
            
            if (controls && controls.enabled && !gyroActive && lockedGyroRoll !== 0) {
                camera.quaternion.copy(cleanTargetQuaternion);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeCameraViewport();
        }

        init3D();
    </script>
</body>
</html>
