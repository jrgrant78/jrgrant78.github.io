<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resilient Mobile AR Spatial Sculptor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #0b0b0f; color: #fff; }

        #controls { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15,15,22,0.9); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); 
            box-sizing: border-box;
        }
        
        .upper-deck {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: stretch;
            width: 100%;
        }

        .control-core {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 170px;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 0;
        }

        .header-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            width: 100%;
        }

        #uiToggleBtn { 
            width: 32px; 
            height: 32px; 
            background: #1a1a24; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #uiToggleBtn:active { transform: scale(0.95); }
        
        #cameraWindow { 
            width: 120px;
            height: 90px;
            flex-shrink: 0;
            border: 2px solid #00e5ff; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box;
            position: relative;
        }
        #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #libraryPreview { width: 100%; height: 100%; object-fit: cover; display: none; cursor: pointer; }
        #folderPlaceholder { 
            width: 100%; 
            height: 100%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            background: #111116; 
            cursor: pointer; 
            color: #88889c;
        }
        
        #sourceToggleBtn {
            position: absolute;
            bottom: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: rgba(26,26,36,0.85);
            border: 1px solid #555;
            border-radius: 4px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 12;
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #sourceToggleBtn:hover { border-color: #00e5ff; color: #00e5ff; }

        .btn-toolbar { display: flex; gap: 8px; width: 100%; margin: 0; }
        
        button.action-btn { 
            flex: 1; 
            aspect-ratio: 1;
            background: #1a1a24; 
            border: 2px solid #444; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button.btn-scan { color: #00e676; border-color: #00e676; } 
        button.btn-gyro { color: #ffea00; border-color: #ffea00; } 
        button.btn-clear { color: #ff1744; border-color: #ff1744; } 
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
        }
        .key-input {
            flex: 1;
            background: #111116;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-top: 0 !important;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.8em;
            outline: none;
        }
        .key-input:focus { border-color: #00e5ff; }

        button.btn-overlay {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            color: #ffffff;
            border: 1px solid #444;
            background: #1a1a24;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-active { background: #ffea00 !important; color: #0b0b0f !important; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        button.btn-overlay.overlay-engaged { background: #00e5ff !important; color: #0b0b0f !important; border-color: #00e5ff !important; }

        #status { color: #ffab00; font-weight: bold; margin-top: 10px; font-size: 0.8em; display: none; }
        #aiDescription { margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 150px; overflow-y: auto; background: #15151f; padding: 6px; border-radius: 4px; border: 1px solid #222; white-space: pre-wrap; line-height: 1.4; }
        
        #debugPanel { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75em; color: #00ffcc; border: 1px solid #222; pointer-events: none; }
        
        #canvas3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 2; pointer-events: auto; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="controls">
        <div class="upper-deck">
            <div class="control-core">
                <div class="header-row">
                    <button id="uiToggleBtn" title="Toggle UI Controls">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                    <h4 style="margin: 0; color: #00e5ff; font-size: 0.85em; letter-spacing: 0.3px; flex-grow: 1; text-align: left;">Spatial Sculptor</h4>
                </div>
                
                <div class="btn-toolbar" id="toolbarNode">
                    <button id="scanBtn" class="action-btn btn-scan" title="Scan Environment">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path>
                        </svg>
                    </button>
                    <button id="gyroBtn" class="action-btn btn-gyro" title="Toggle Free Walk">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle>
                            <line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line>
                        </svg>
                    </button>
                    <button id="clearBtn" class="action-btn btn-clear" title="Reset Scene">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="cameraWindow">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <img id="libraryPreview" alt="Device selection display element">
                <div id="folderPlaceholder">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <button id="sourceToggleBtn" title="Switch Input Type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div id="lowerContent">
            <div class="input-row">
                <input type="password" id="apiKeyField" class="key-input" placeholder="Enter Gemini API Key...">
                <button id="overlayToggleBtn" class="btn-overlay" title="Toggle Image Alignment Plane">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline>
                    </svg>
                </button>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div id="status">Deconstructing spatial geometry orientation...</div>
            <div id="aiDescription">Awaiting snapshot capture execution sequence...</div>
        </div>
    </div>

    <div id="debugPanel">System Initializing...</div>
    <canvas id="canvas3d"></canvas>

    <script>
        let scene, camera, renderer, controls;
        let videoElement, localStream;
        
        let gyroActive = false;
        let isFirstGyroFrame = false;
        let gyroYawOffset = 0; 
        let lockedGyroRoll = 0; 
        const cleanTargetQuaternion = new THREE.Quaternion(); 
        
        let perceptionEngine;
        const PITCH_THRESHOLD = THREE.MathUtils.degToRad(5);  
        const TRANSLATION_SPEED_SCALAR = 3.8;                 
        let visualTelemetry = { scaleFlow: 0, panFlow: 0, gated: true };
        
        const worldGroup = new THREE.Group();
        let scanInProgress = false;
        
        let dynamicInputSourceMode = 'camera';
        let scannedBackdropDataUrl = null;
        let backdropOverlayActive = false;
        let floatingBackdropMesh = null; 
        let rawCachedShapesArray = null;  

        let telemetryState = { x: 0, y: 5, z: 15 };

        const OPEN_EYE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const CLOSED_EYE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10c4 4 14 4 18 0"/><path d="M6 11.5l-1 2"/><path d="M12 13v3"/></svg>`;

        const ICON_CAMERA_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"/></svg>`;
        const ICON_PHOTO_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"></polyline></svg>`;

        class RadialMassPerceptionEngine {
            constructor() {
                this.canvas = document.createElement('canvas');
                this.canvas.width = 32;
                this.canvas.height = 32;
                this.ctx = this.canvas.getContext('2d');
                this.prevD = 0;
                this.prevX = 0;
                this.initialized = false;
                
                this.smoothScale = 0;
                this.smoothPan = 0;
                this.smoothingFactor = 0.12; 
            }

            analyze(video) {
                if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return { scale: 0, pan: 0 };
                
                this.ctx.drawImage(video, 0, 0, 32, 32);
                const rawPixels = this.ctx.getImageData(0, 0, 32, 32).data;
                
                let rowSum = new Float32Array(32);
                let colSum = new Float32Array(32);
                
                for (let y = 0; y < 32; y++) {
                    for (let x = 0; x < 32; x++) {
                        const idx = (y * 32 + x) * 4;
                        const luma = (rawPixels[idx] + rawPixels[idx + 1] + rawPixels[idx + 2]) / 3.0;
                        rowSum[y] += luma;
                        colSum[x] += luma;
                    }
                }

                let massLeft = 0, weightLeft = 0;
                let massRight = 0, weightRight = 0;
                let massTotal = 0, weightTotal = 0;

                for (let x = 0; x < 32; x++) {
                    massTotal += x * colSum[x];
                    weightTotal += colSum[x];
                    if (x < 16) {
                        massLeft += x * colSum[x];
                        weightLeft += colSum[x];
                    } else {
                        massRight += x * colSum[x];
                        weightRight += colSum[x];
                    }
                }

                const centerX_L = weightLeft > 0 ? massLeft / weightLeft : 0;
                const centerX_R = weightRight > 0 ? massRight / weightRight : 16;
                const currentD = centerX_R - centerX_L; 
                const currentX = weightTotal > 0 ? massTotal / weightTotal : 16;

                if (!this.initialized) {
                    this.prevD = currentD;
                    this.prevX = currentX;
                    this.initialized = true;
                    return { scale: 0, pan: 0 };
                }

                let deltaD = currentD - this.prevD;
                let deltaX = currentX - this.prevX;

                this.prevD = currentD;
                this.prevX = currentX;

                if (Math.abs(deltaD) < 0.012) deltaD = 0;
                if (Math.abs(deltaX) < 0.012) deltaX = 0;

                const rawScale = deltaD * 8.0;
                const rawPan = deltaX * 2.5;

                this.smoothScale += this.smoothingFactor * (rawScale - this.smoothScale);
                this.smoothPan += this.smoothingFactor * (rawPan - this.smoothPan);

                return {
                    scale: this.smoothScale,
                    pan: this.smoothPan
                };
            }
        }

        const getSensorQuaternion = (function () {
            const zee = new THREE.Vector3( 0, 0, 1 );
            const euler = new THREE.Euler();
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion( - Math.sqrt( 0.5 ), 0, 0, Math.sqrt( 0.5 ) ); 

            return function ( alpha, beta, gamma, orient ) {
                const q = new THREE.Quaternion();
                euler.set( beta, alpha, - gamma, 'YXZ' ); 
                q.setFromEuler( euler ); 
                q.multiply( q1 ); 
                q.multiply( q0.setFromAxisAngle( zee, - orient ) ); 
                return q;
            };
        })();

        function createRoundedBoxGeometry(w, h, d, radius, segments) {
            w = Math.max(w, 0.05); h = Math.max(h, 0.05); d = Math.max(d, 0.05);
            const r = Math.min(radius, Math.min(w, h) * 0.45);
            const shape = new THREE.Shape();
            const x = -w / 2, y = -h / 2;
            
            shape.moveTo(x, y + r);
            shape.lineTo(x, y + h - r);
            shape.quadraticCurveTo(x, y + h, x + r, y + h);
            shape.lineTo(x + w - r, y + h);
            shape.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
            shape.lineTo(x + w, y + r);
            shape.quadraticCurveTo(x + w, y, x + w - r, y);
            shape.lineTo(x + r, y);
            shape.quadraticCurveTo(x, y, x, y + r);

            const geo = new THREE.ExtrudeGeometry(shape, {
                depth: Math.max(0.01, d - (2 * r)),
                bevelEnabled: true,
                bevelSegments: segments,
                steps: 1,
                bevelSize: r,
                bevelThickness: r,
                curveSegments: segments * 2
            });
            geo.center();
            return geo;
        }

        function extractCleanJsonObject(rawText) {
            const firstOpen = rawText.indexOf('{');
            if (firstOpen === -1) throw new Error("Object boundary missing.");
            let depth = 0;
            for (let i = firstOpen; i < rawText.length; i++) {
                if (rawText[i] === '{') depth++;
                else if (rawText[i] === '}') {
                    depth--;
                    if (depth === 0) return rawText.substring(firstOpen, i + 1);
                }
            }
            throw new Error("Mismatched block bounds.");
        }

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x06060a);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(telemetryState.x, telemetryState.y, telemetryState.z);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            initOrbitControls();
            
            perceptionEngine = new RadialMassPerceptionEngine();

            const grid = new THREE.GridHelper(50, 25, 0x1f1f2e, 0x111116);
            grid.position.y = -3;
            scene.add(grid);

            scene.add(new THREE.AmbientLight(0xffffff, 0.35));
            
            const keyLight = new THREE.DirectionalLight(0xfffecb, 1.4);
            keyLight.position.set(15, 25, 20);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 1024;
            keyLight.shadow.mapSize.height = 1024;
            keyLight.shadow.bias = -0.001;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xdbe7ff, 0.5);
            fillLight.position.set(-15, 10, 10);
            scene.add(fillLight);

            const dramaticRimLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dramaticRimLight.position.set(-5, 12, -25);
            scene.add(dramaticRimLight);

            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('scanBtn').addEventListener('click', captureAndScanFrame);
            document.getElementById('gyroBtn').addEventListener('click', toggleSensorsFunctionality);
            document.getElementById('clearBtn').addEventListener('click', clearSceneAndResetView);
            document.getElementById('uiToggleBtn').addEventListener('click', toggleControlPanelsVisibility);
            document.getElementById('overlayToggleBtn').addEventListener('click', toggleSpatialBackdropOverlay);
            
            document.getElementById('sourceToggleBtn').addEventListener('click', toggleInputSourceMode);
            document.getElementById('folderPlaceholder').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('libraryPreview').addEventListener('click', triggerDeviceFileBrowser);
            document.getElementById('fileInput').addEventListener('change', handleDeviceFileSelection);

            initRearCameraStreamGracefully();

            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('apiKeyField').value = urlKey.trim();
                document.getElementById('aiDescription').innerHTML = "Ready to scan scene!<br>Gemini API Key loaded.";
            }
            animate();
        }

        function toggleSpatialBackdropOverlay() {
            const btn = document.getElementById('overlayToggleBtn');
            if (backdropOverlayActive) {
                backdropOverlayActive = false;
                btn.classList.remove('overlay-engaged');
                if (floatingBackdropMesh) floatingBackdropMesh.visible = false;
            } else {
                if (!scannedBackdropDataUrl) return;
                backdropOverlayActive = true;
                btn.classList.add('overlay-engaged');
                if (floatingBackdropMesh) floatingBackdropMesh.visible = true;
            }
        }

        function toggleInputSourceMode(e) {
            if(e) e.stopPropagation();
            
            const camFeed = document.getElementById('cameraFeed');
            const libPreview = document.getElementById('libraryPreview');
            const placeholder = document.getElementById('folderPlaceholder');
            const toggleBtn = document.getElementById('sourceToggleBtn');
            const desc = document.getElementById('aiDescription');

            if (dynamicInputSourceMode === 'camera') {
                dynamicInputSourceMode = 'library';
                toggleBtn.innerHTML = ICON_PHOTO_SVG;
                camFeed.style.display = 'none';
                
                if (libPreview.src && libPreview.src !== window.location.href && libPreview.src !== '') {
                    libPreview.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    libPreview.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
                desc.innerHTML = "Library Mode Active.<br>Tap target frame viewport area to select local data asset.";
            } else {
                dynamicInputSourceMode = 'camera';
                toggleBtn.innerHTML = ICON_CAMERA_SVG;
                libPreview.style.display = 'none';
                placeholder.style.display = 'none';
                camFeed.style.display = 'block';
                desc.innerHTML = "Live Feed Active.<br>Aim camera lens array and tap capture button.";
            }
        }

        function triggerDeviceFileBrowser() {
            if (dynamicInputSourceMode === 'library') {
                document.getElementById('fileInput').click();
            }
        }

        function handleDeviceFileSelection(e) {
            const targetFile = e.target.files[0];
            if (!targetFile) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('libraryPreview');
                const placeholder = document.getElementById('folderPlaceholder');
                
                imgElement.src = event.target.result;
                imgElement.style.display = 'block';
                placeholder.style.display = 'none';
                
                document.getElementById('aiDescription').innerHTML = "Asset loaded cleanly.<br>Ready to sculpt matrix data trees.";
            };
            reader.readAsDataURL(targetFile);
        }

        function toggleControlPanelsVisibility() {
            const toolbar = document.getElementById('toolbarNode');
            const cameraWin = document.getElementById('cameraWindow');
            const lowerContent = document.getElementById('lowerContent');
            const toggleBtn = document.getElementById('uiToggleBtn');

            if (toolbar.style.display === 'none') {
                toolbar.style.display = 'flex';
                cameraWin.style.display = 'block';
                lowerContent.style.display = 'block';
                toggleBtn.innerHTML = OPEN_EYE_SVG;
            } else {
                toolbar.style.display = 'none';
                cameraWin.style.display = 'none';
                lowerContent.style.display = 'none';
                toggleBtn.innerHTML = CLOSED_EYE_SVG;
            }
        }

        function initOrbitControls() {
            if (!controls) {
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
            }
            controls.enabled = true;
        }

        async function initRearCameraStreamGracefully() {
            videoElement = document.getElementById('cameraFeed');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                videoElement.srcObject = localStream;
            } catch (err) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoElement.srcObject = localStream;
                } catch (e) {
                    document.getElementById('debugPanel').innerText = "Camera Stream Error";
                }
            }
        }

        async function captureAndScanFrame() {
            if (scanInProgress) return;
            console.clear();
            
            const descDiv = document.getElementById('aiDescription');
            const statusDiv = document.getElementById('status');
            const scanBtn = document.getElementById('scanBtn');
            const userEnteredKey = document.getElementById('apiKeyField').value.trim();

            if (!userEnteredKey) {
                descDiv.innerHTML = "<span style='color:#ff3333;'>Authentication Error: Key field cannot be left blank.</span>";
                return;
            }

            const hiddenCanvas = document.createElement('canvas');
            const ctx = hiddenCanvas.getContext('2d');

            if (dynamicInputSourceMode === 'camera') {
                if (!videoElement || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                    alert("Camera initialization incomplete.");
                    return;
                }
                hiddenCanvas.width = videoElement.videoWidth;
                hiddenCanvas.height = videoElement.videoHeight;
                ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            } else {
                const libraryImg = document.getElementById('libraryPreview');
                if (!libraryImg.src || libraryImg.style.display === 'none') {
                    alert("Pipeline Error: Please upload an image target inside the source terminal view first.");
                    return;
                }
                hiddenCanvas.width = libraryImg.naturalWidth || 800;
                hiddenCanvas.height = libraryImg.naturalHeight || 600;
                ctx.drawImage(libraryImg, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            }
            
            scannedBackdropDataUrl = hiddenCanvas.toDataURL('image/jpeg');
            const base64Image = scannedBackdropDataUrl.split(',')[1];

            scanInProgress = true;
            scanBtn.disabled = true;
            statusDiv.style.display = 'block';

            // RESTORED: Fixed production model configurations tracking to targeted 2026 active endpoints
            const modelCascadeList = [
                'gemini-3.5-flash',
                'gemini-3.1-flash-lite',
                'gemini-3.1-pro-preview',
                'gemini-2.5-pro',
                'gemini-2.5-flash'
            ];
            
            let parsedPayload = null;
            let unifiedShapes = [];
            let successfulPass1Model = "none";
            let debugDiagnosticsHistory = "";

            const pass1Prompt = `
                Act as an advanced 3D Spatial Scaffolder. Analyze this image frame completely.
                Your response must populate exactly two fields inside the target JSON object:
                1. description: Provide a rich text summary describing the exact subjects, blue dress clothing textures, base turtle pedestal, and flowing long hair attributes observed.
                2. blueprint: An architectural text blueprint manifest listing 80+ structural primitives categorized under these four distinct structural headers:
                
                ### REGION: FOUNDATION
                ### REGION: WARDROBE
                ### REGION: LIMBS
                ### REGION: PORTRAIT
                
                Strict Geometric Template Directives:
                - Ground floor platform surface is fixed at elevation y = -3.
                - Body dress center mass spans between y = -1.2 and y = 0.8.
                - Head skull sphere center mass is fixed tightly at elevation y = 2.4.
                - Under ### REGION: PORTRAIT, you MUST generate 25+ distinct layered text items describing the cascading brown hair shell before listing facial nodes.
                
                Format each text entry line exactly like this template:
                "- type=[type], material=[material], color=[hex], position=[x,y,z], scale=[x,y,z], rotation=[x,y,z]"
            `;

            pass1ModelLoop: for (let model of modelCascadeList) {
                try {
                    statusDiv.innerText = `Pass 1: Prompting ${model}...`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userEnteredKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: pass1Prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: { description: { type: "STRING" }, blueprint: { type: "STRING" } },
                                    required: ["description", "blueprint"]
                                }
                            }
                        })
                    });

                    if (!res.ok) {
                        const errorDetailsText = await res.text();
                        debugDiagnosticsHistory += `• ${model} HTTP Error ${res.status}: ${errorDetailsText.substring(0, 120)}...<br>`;
                        continue;
                    }

                    const data = await res.json();
                    
                    if (data.error) {
                        debugDiagnosticsHistory += `• ${model} API Error: ${data.error.message}<br>`;
                        continue;
                    }

                    if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                        const reason = data.candidates?.[0]?.finishReason || "UNKNOWN_BLOCK";
                        debugDiagnosticsHistory += `• ${model} Blocked: Finish reason code = [${reason}]<br>`;
                        continue;
                    }

                    parsedPayload = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                    if (parsedPayload && parsedPayload.blueprint) {
                        successfulPass1Model = model;
                        break pass1ModelLoop; 
                    }
                } catch (e) { 
                    debugDiagnosticsHistory += `• ${model} Exception: ${e.message}<br>`;
                }
            }

            if (!parsedPayload || !parsedPayload.blueprint) {
                descDiv.innerHTML = `
                    <span style='color:#ff3333; font-weight:bold;'>Pass 1 Fatal Cascade Failure</span><br>
                    <div style='background:#221111; border:1px solid #ff3333; padding:10px; border-radius:4px; margin-top:8px;'>
                        <b>Inference Engine Diagnostic Trail:</b><br>${debugDiagnosticsHistory || "No server responses recorded. Check device internet stability."}
                    </div>`;
                scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
                return;
            }

            descDiv.innerHTML = `<b>[Orchestrator: ${successfulPass1Model}]</b><br>${parsedPayload.description}`;

            const structuralTasks = [
                { id: 'FOUNDATION', rules: 'Compile the bottom green pedestal layout. Force 20+ shapes.' },
                { id: 'WARDROBE', rules: 'Compile the blue dress geometry. Ensure solid contiguous boxes.' },
                { id: 'LIMBS', rules: 'Compile complete connected limb extensions. Attach upper arms directly to the torso sides, and thighs to the dress baseline. Ensure forearms, hands, calves, and feet are fully written.' },
                { id: 'PORTRAIT', rules: 'CRITICAL LAW: You must process the HAIR layers first. Translate every text line describing hair capsules into actual JSON array entries. Build a thick volumetric shell wrapping around the head sphere down past the shoulders. Do not drop items.' }
            ];

            const splitSegments = parsedPayload.blueprint.split(/### REGION:\s*/i);

            const regionalCompilationPromises = structuralTasks.map(async (task) => {
                let isolatedTextSnippet = "";
                for (let segment of splitSegments) {
                    if (segment.toUpperCase().startsWith(task.id)) {
                        isolatedTextSnippet = segment;
                        break;
                    }
                }
                if (!isolatedTextSnippet.trim()) isolatedTextSnippet = parsedPayload.blueprint;

                const pass2Prompt = `
                    You are a precision 3D Geometry compiler specializing in the [${task.id}] zone.
                    Convert this local isolated text block blueprint directly into a functional JSON shapes layout array.
                    
                    DATA BLOCK TO COMPILE:
                    "${isolatedTextSnippet}"
                    
                    COMPILER DIRECTIVES:
                    - ${task.rules}
                    - Translate every single written text line item into the structural JSON output. Do not truncate early or drop sections.
                `;

                for (let model of modelCascadeList) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userEnteredKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: pass2Prompt }] }], 
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            shapes: {
                                                type: "ARRAY",
                                                items: {
                                                    type: "OBJECT",
                                                    properties: {
                                                        t: { type: "STRING" }, m: { type: "STRING" }, c: { type: "STRING" },
                                                        p: { type: "ARRAY", items: { type: "NUMBER" } },
                                                        s: { type: "ARRAY", items: { type: "NUMBER" } },
                                                        r: { type: "ARRAY", items: { type: "NUMBER" } }
                                                    },
                                                    required: ["t", "m", "c", "p", "s", "r"]
                                                }
                                            }
                                        },
                                        required: ["shapes"]
                                    }
                                }
                            })
                        });

                        if (res.ok) {
                            const data = await res.json();
                            if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                                const parsed = JSON.parse(extractCleanJsonObject(data.candidates[0].content.parts[0].text));
                                if (parsed && Array.isArray(parsed.shapes)) {
                                    return { id: task.id, model: model, shapes: parsed.shapes };
                                }
                            }
                        }
                    } catch (e) { console.warn(`Pass 2 exception on zone ${task.id} via ${model}:`, e); }
                }
                return { id: task.id, model: "failed", shapes: [] };
            });

            try {
                statusDiv.innerText = "Launching parallel compilation pipelines...";
                const compiledResults = await Promise.all(regionalCompilationPromises);
                
                let reportTrackingLog = "<br><br><b>Sector Compilation Audit:</b>";
                compiledResults.forEach((result) => {
                    if (result.shapes.length > 0) {
                        unifiedShapes.push(...result.shapes);
                    }
                    reportTrackingLog += `<br>• Zone [${result.id}] compiled successfully via <i>${result.model}</i> (${result.shapes.length} nodes)`;
                });

                if (unifiedShapes.length > 0) {
                    descDiv.innerHTML += reportTrackingLog;
                    rawCachedShapesArray = unifiedShapes; 
                    renderAIBlueprint(unifiedShapes);
                } else {
                    descDiv.innerHTML = "<span style='color:#ff3333;'>Compilation thread failure. Assembled index array returned empty coordinates.</span>";
                }
            } catch (err) {
                console.error(err);
                descDiv.innerHTML = "<span style='color:#ff3333;'>Parallel pipeline synchronization exception.</span>";
            }

            scanInProgress = false; scanBtn.disabled = false; statusDiv.style.display = 'none';
        }

        function renderAIBlueprint(shapesArray) {
            while(worldGroup.children.length > 0) {
                const child = worldGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                worldGroup.remove(child);
            }

            if (floatingBackdropMesh) {
                if (floatingBackdropMesh.geometry) floatingBackdropMesh.geometry.dispose();
                if (floatingBackdropMesh.material) {
                    if (floatingBackdropMesh.material.map) floatingBackdropMesh.material.map.dispose();
                    floatingBackdropMesh.material.dispose();
                }
                scene.remove(floatingBackdropMesh);
                floatingBackdropMesh = null;
            }

            shapesArray.forEach(shape => {
                if (!shape || !shape.t) return;
                let geo;
                const pos = shape.p || [0,0,0];
                const scl = shape.s || [1,1,1];
                const rot = shape.r || [0,0,0];
                let customScaleHandled = false;

                try {
                    switch(shape.t.toLowerCase().trim()) {
                        case 'box': geo = new THREE.BoxGeometry(1, 1, 1); break;
                        case 'roundedbox':
                            customScaleHandled = true;
                            geo = createRoundedBoxGeometry(scl[0]||1, scl[1]||1, scl[2]||1, 0.04, 3);
                            break;
                        case 'sphere': geo = new THREE.SphereGeometry(0.5, 32, 32); break;
                        case 'cylinder': geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 24); break;
                        case 'cone': geo = new THREE.ConeGeometry(0.5, 1, 24); break;
                        case 'capsule': geo = new THREE.CapsuleGeometry(0.3, 0.6, 8, 24); break;
                        case 'torus': geo = new THREE.TorusGeometry(0.4, 0.1, 12, 36); break;
                        default: geo = new THREE.BoxGeometry(1, 1, 1);
                    }

                    if (geo) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: new THREE.Color(shape.c || "#ffffff"),
                            roughness: shape.t === 'roundedbox' || shape.t === 'sphere' ? 0.15 : 0.6,
                            metalness: shape.m === 'metal' ? 0.8 : 0.1,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.1,
                            side: THREE.DoubleSide
                        });

                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.set(pos[0], pos[1], pos[2]);
                        mesh.rotation.set(rot[0], rot[1], rot[2]);
                        if (!customScaleHandled) mesh.scale.set(scl[0], scl[1], scl[2]);

                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        worldGroup.add(mesh);
                    }
                } catch (e) { console.error(e); }
            });

            if (worldGroup.children.length > 0) {
                const box = new THREE.Box3().setFromObject(worldGroup);
                const center = new THREE.Vector3(); box.getCenter(center);
                if (controls) {
                    controls.target.copy(center);
                    controls.update();
                }

                if (scannedBackdropDataUrl) {
                    const size = new THREE.Vector3(); box.getSize(size);
                    const texture = new THREE.TextureLoader().load(scannedBackdropDataUrl);
                    floatingBackdropMesh = new THREE.Mesh(
                        new THREE.PlaneGeometry(1, 1),
                        new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
                    );
                    floatingBackdropMesh.position.set(center.x, center.y, box.min.z - 1.5);
                    floatingBackdropMesh.scale.set(Math.max(size.x, 6), Math.max(size.y, 6), 1);
                    floatingBackdropMesh.visible = backdropOverlayActive;
                    scene.add(floatingBackdropMesh);
                }
            }
        }

        function toggleSensorsFunctionality() {
            const btn = document.getElementById('gyroBtn');
            if (gyroActive) {
                deactivateTrackingSensors();
            } else {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(state => {
                        if (state === 'granted') activateTrackingSensors(btn);
                    });
                } else {
                    activateTrackingSensors(btn);
                }
            }
        }

        function activateTrackingSensors(btn) {
            if (controls) { 
                controls.enabled = false; 
            }
            isFirstGyroFrame = true;
            window.addEventListener('deviceorientation', handleGyroscopeMotionInput, true);
            gyroActive = true;
            btn.classList.add('btn-active');
        }

        function deactivateTrackingSensors() {
            if (!gyroActive) return;
            window.removeEventListener('deviceorientation', handleGyroscopeMotionInput);
            gyroActive = false;
            document.getElementById('gyroBtn').classList.remove('btn-active');
            
            const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            lockedGyroRoll = euler.z; 
            
            euler.z = 0;
            camera.quaternion.setFromEuler(euler);
            camera.updateMatrix();
            camera.updateMatrixWorld(true);
            
            const currentForwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const explicitTargetPoint = new THREE.Vector3().copy(camera.position).addScaledVector(currentForwardDir, 10);
            
            camera.lookAt(explicitTargetPoint);
            
            if (controls) {
                controls.dispose();
            }
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.copy(explicitTargetPoint);
            
            controls.enableDamping = false;
            controls.update();
            
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
        }

        function clearSceneAndResetView() {
            console.clear();
            
            while(worldGroup.children.length > 0) {
                let c = worldGroup.children[0];
                if(c.geometry) c.geometry.dispose();
                if(c.material) c.material.dispose();
                worldGroup.remove(c);
            }
            deactivateTrackingSensors();
            lockedGyroRoll = 0; 
            rawCachedShapesArray = null;
            scannedBackdropDataUrl = null;
            camera.position.set(0, 5, 15);
            if (controls) {
                controls.target.set(0, 0, 0);
                controls.update();
            }
            document.getElementById('aiDescription').innerText = "Workspace cleared. System active.";
        }

        function handleGyroscopeMotionInput(e) {
            if (!gyroActive) return;
            
            let alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            let beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            let gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
            let orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

            let qSensor = getSensorQuaternion(alpha, beta, gamma, orient);
            let sensorEuler = new THREE.Euler().setFromQuaternion(qSensor, 'YXZ');

            if (isFirstGyroFrame) {
                let currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                gyroYawOffset = currentEuler.y - sensorEuler.y;
                isFirstGyroFrame = false;
            }

            sensorEuler.y += gyroYawOffset;
            camera.quaternion.setFromEuler(sensorEuler);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gyroActive && perceptionEngine) {
                const massFlow = perceptionEngine.analyze(videoElement);
                const currentEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                
                visualTelemetry.scaleFlow = massFlow.scale;
                visualTelemetry.panFlow = massFlow.pan;
                
                if (Math.abs(currentEuler.x) <= PITCH_THRESHOLD) {
                    visualTelemetry.gated = false;
                    
                    const forwardXZ = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forwardXZ.y = 0; 
                    forwardXZ.normalize();
                    
                    const rightXZ = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    rightXZ.y = 0;
                    rightXZ.normalize();

                    const moveStepZ = massFlow.scale * TRANSLATION_SPEED_SCALAR;
                    const moveStepX = -massFlow.pan * TRANSLATION_SPEED_SCALAR;
                    
                    camera.position.addScaledVector(forwardXZ, moveStepZ);
                    camera.position.addScaledVector(rightXZ, moveStepX);
                    
                    if (controls) {
                        controls.target.addScaledVector(forwardXZ, moveStepZ);
                        controls.target.addScaledVector(rightXZ, moveStepX);
                    }
                } else {
                    visualTelemetry.gated = true; 
                }
            }

            if (controls && controls.enabled) {
                controls.update();
                
                if (!gyroActive && lockedGyroRoll !== 0) {
                    cleanTargetQuaternion.copy(camera.quaternion);
                    camera.rotateZ(lockedGyroRoll);
                }
            }
            
            telemetryState.x = camera.position.x;
            telemetryState.z = camera.position.z;
            
            document.getElementById('debugPanel').innerText = `Coord: X:${telemetryState.x.toFixed(2)} Z:${telemetryState.z.toFixed(2)} | Zoom:${visualTelemetry.scaleFlow.toFixed(3)} Pan:${visualTelemetry.panFlow.toFixed(3)} Horizon:${visualTelemetry.gated ? 'Gated' : 'TRACKING'} | Objects: ${worldGroup.children.length}`;
            
            renderer.render(scene, camera);
            
            if (controls && controls.enabled && !gyroActive && lockedGyroRoll !== 0) {
                camera.quaternion.copy(cleanTargetQuaternion);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;
    </script>
</body>
</html>
